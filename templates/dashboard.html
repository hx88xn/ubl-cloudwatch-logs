<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudWatch Logs Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/hearth.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">&#9729;</div>
            <span class="logo-text">CloudWatch Logs</span>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Logs Dashboard</h1>
            <div class="header-meta">
                <span>Log Group: <strong>{{ log_group }}</strong></span>
                <span>Region: <strong>{{ region }}</strong></span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalLogs">0</div>
                <div class="stat-label">Total Logs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPage">1</div>
                <div class="stat-label">Current Page</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeRangeDisplay">1h</div>
                <div class="stat-label">Time Range</div>
            </div>
        </div>

        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Search Logs</label>
                    <input type="text" id="searchInput" class="filter-input" placeholder="Search logs...">
                </div>
                <div class="filter-group">
                    <label>Time Range</label>
                    <select id="timeRangeSelect" class="filter-select">
                        <option value="1">Last 1 Hour</option>
                        <option value="6">Last 6 Hours</option>
                        <option value="24">Last 24 Hours</option>
                        <option value="48">Last 2 Days</option>
                        <option value="168">Last 7 Days</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Log Source</label>
                    <select id="logSourceSelect" class="filter-select">
                        <option value="cloudwatch">CloudWatch</option>
                        <option value="loki">Grafana Loki</option>
                    </select>
                </div>
            </div>
            <div class="custom-range-container" id="customRangeContainer">
                <label class="custom-range-label">Custom Range:</label>
                <input type="number" id="customRangeValue" class="custom-range-input" min="1" value="1" placeholder="Value">
                <select id="customRangeUnit" class="custom-range-unit">
                    <option value="hours">Hours</option>
                    <option value="days">Days</option>
                </select>
                <button class="btn btn-apply-custom" onclick="applyCustomRange()">Apply</button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="fetchLogs(1)">&#8635; Refresh</button>
            <button class="btn btn-secondary" onclick="clearFilters()">&#10005; Clear Filters</button>
            <button class="btn btn-secondary" onclick="exportLogs()">&#8615; Export</button>
            <a href="/app-logs" class="btn btn-secondary">&#128196; App Logs</a>
            <a href="/audio-files" class="btn btn-secondary">&#127925; Audio Files</a>
            <a href="/traffic" class="btn btn-secondary" id="trafficBtn" style="display: none;">&#128666; Traffic</a>
            <a href="/requests" class="btn btn-secondary" id="requestsBtn" style="display: none;">&#128202; Requests</a>
            <a href="/summary" class="btn btn-secondary">&#128203; Summary</a>
        </div>

        <div class="logs-container">
            <div class="logs-header">
                <span id="logCount">0 logs</span>
                <div class="pagination">
                    <button class="btn btn-secondary" id="prevBtn" onclick="previousPage()" style="display: none;">&#9664; Prev</button>
                    <span class="page-info">Page <span id="pageNumber">1</span> of <span id="totalPagesDisplay">1</span></span>
                    <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" style="display: none;">Next &#9654;</button>
                </div>
            </div>
            <div class="logs-scroll" id="logsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading logs...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let allLogs = [];
        let allLogsUnfiltered = [];
        let isLoading = false;
        let searchDebounceTimer = null;
        const token = localStorage.getItem('access_token');
        let currentAbortController = null;
        let customHours = null;

        if (!token) {
            window.location.href = '/login';
        }

        async function checkDashboardAccess() {
            try {
                const response = await fetch('/api/user/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    if (userData.role === 'ubl-test-team') {
                        window.location.href = '/app-logs';
                        return false;
                    }
                    if (userData.role === 'admin-ubl') {
                        const trafficBtn = document.getElementById('trafficBtn');
                        if (trafficBtn) trafficBtn.style.display = 'inline-flex';
                        const requestsBtn = document.getElementById('requestsBtn');
                        if (requestsBtn) requestsBtn.style.display = 'inline-flex';
                    }
                } else if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return false;
                }
            } catch (error) {
                console.error('Error checking access:', error);
            }
            return true;
        }

        checkDashboardAccess();

        function debounce(func, delay) {
            return function (...args) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function toPakistanTime(timestamp) {
            const date = new Date(timestamp);
            const options = {
                timeZone: 'Asia/Karachi',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const formatter = new Intl.DateTimeFormat('en-CA', options);
            const parts = formatter.formatToParts(date);
            const dateParts = {};
            parts.forEach(part => {
                dateParts[part.type] = part.value;
            });
            return `${dateParts.year}-${dateParts.month}-${dateParts.day} ${dateParts.hour}:${dateParts.minute}:${dateParts.second}`;
        }

        function showLoading() {
            isLoading = true;
            document.getElementById('logsContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading logs...</div>
                </div>
            `;
        }

        async function fetchLogs(page = 1, showLoadingState = true) {
            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;
            const hours = customHours || document.getElementById('timeRangeSelect').value || '1';
            const search = document.getElementById('searchInput').value.trim();
            const fetchLimit = 500000;
            const fetchPageSize = 500000;
            currentPage = 1;
            if (showLoadingState) {
                showLoading();
            }
            try {
                const logSource = document.getElementById('logSourceSelect') ? document.getElementById('logSourceSelect').value : 'cloudwatch';
                let url = `/api/logs?hours=${hours}&limit=${fetchLimit}&page=1&page_size=${fetchPageSize}&source=${logSource}`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    signal: signal
                });
                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return;
                }
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                allLogsUnfiltered = data.logs;
                allLogs = data.logs;
                totalPages = 1;
                displayLogs({ logs: allLogs });
                updateStats({ logs: allLogs });
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const pageInfo = document.querySelector('.page-info');
                if (prevBtn) prevBtn.style.display = 'none';
                if (nextBtn) nextBtn.style.display = 'none';
                if (pageInfo) pageInfo.textContent = `${data.logs?.length || 0} logs loaded`;
                showToast('Logs refreshed');
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Request cancelled');
                    return;
                }
                console.error('Error fetching logs:', error);
                document.getElementById('logsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#9888;</div>
                        <div>Error loading logs: ${error.message}</div>
                    </div>
                `;
                showToast('Error fetching logs', 'error');
            } finally {
                isLoading = false;
            }
        }

        function displayLogs(data) {
            const container = document.getElementById('logsContainer');
            const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            const logsToGroup = allLogsUnfiltered.length > 0 ? allLogsUnfiltered : (data.logs || []);
            if (!logsToGroup || logsToGroup.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#128237;</div>
                        <div>No logs found for the selected criteria</div>
                    </div>
                `;
                return;
            }
            const uuidGroups = groupLogsByUUID(logsToGroup);
            if (searchQuery) {
                const filteredGroups = {};
                const filteredNoUUIDLogs = [];
                Object.keys(uuidGroups.groups).forEach(uuid => {
                    const groupLogs = uuidGroups.groups[uuid];
                    const hasMatch = groupLogs.some(log =>
                        log.message.toLowerCase().includes(searchQuery)
                    );
                    if (hasMatch) {
                        filteredGroups[uuid] = groupLogs;
                    }
                });
                uuidGroups.noUUIDLogs.forEach(log => {
                    if (log.message.toLowerCase().includes(searchQuery)) {
                        filteredNoUUIDLogs.push(log);
                    }
                });
                const filteredUuidGroups = { groups: filteredGroups, noUUIDLogs: filteredNoUUIDLogs };
                if (Object.keys(filteredGroups).length === 0 && filteredNoUUIDLogs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">&#128269;</div>
                            <div>No logs found matching "${searchQuery}"</div>
                        </div>
                    `;
                    return;
                }
                container.innerHTML = renderUUIDGroups(filteredUuidGroups);
                const matchingLogsCount = Object.values(filteredGroups).flat().length + filteredNoUUIDLogs.length;
                const pageInfo = document.querySelector('.page-info');
                if (pageInfo) pageInfo.textContent = `${matchingLogsCount} logs in ${Object.keys(filteredGroups).length} groups`;
            } else {
                container.innerHTML = renderUUIDGroups(uuidGroups);
            }
        }

        function groupLogsByUUID(logs) {
            const uuidRegex = /\[([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})\]/g;
            const groups = {};
            const noUUIDLogs = [];
            const processedLogIds = new Set();
            logs.forEach((log, index) => {
                const matches = [...log.message.matchAll(uuidRegex)];
                if (matches && matches.length > 0) {
                    const uuid = matches[0][1];
                    if (!groups[uuid]) {
                        groups[uuid] = [];
                    }
                    groups[uuid].push({ ...log, _index: index });
                    processedLogIds.add(index);
                }
            });
            logs.forEach((log, index) => {
                if (!processedLogIds.has(index)) {
                    noUUIDLogs.push({ ...log, _index: index });
                }
            });
            Object.keys(groups).forEach(uuid => {
                groups[uuid].sort((a, b) => b.timestamp - a.timestamp);
            });
            return { groups, noUUIDLogs };
        }

        function renderUUIDGroups(uuidGroups) {
            const timelineItems = [];
            Object.keys(uuidGroups.groups).forEach(uuid => {
                const logs = uuidGroups.groups[uuid];
                const mostRecentTimestamp = logs[0]?.timestamp || 0;
                const firstLogTime = logs[0]?.timestamp ? toPakistanTime(logs[0].timestamp) : 'Unknown time';
                timelineItems.push({
                    type: 'uuid-group',
                    uuid: uuid,
                    logs: logs,
                    timestamp: mostRecentTimestamp,
                    firstLogTime: firstLogTime
                });
            });
            uuidGroups.noUUIDLogs.forEach(log => {
                timelineItems.push({
                    type: 'single-log',
                    log: log,
                    timestamp: log.timestamp
                });
            });
            timelineItems.sort((a, b) => b.timestamp - a.timestamp);
            if (timelineItems.length > 100) {
                return renderProgressively(timelineItems);
            }
            return renderItemsToHtml(timelineItems, 0, timelineItems.length);
        }

        function renderProgressively(timelineItems) {
            const container = document.getElementById('logsContainer');
            const batchSize = 50;
            let currentIndex = 0;
            container.innerHTML = '';
            function renderBatch() {
                const fragment = document.createDocumentFragment();
                const tempDiv = document.createElement('div');
                const endIndex = Math.min(currentIndex + batchSize, timelineItems.length);
                tempDiv.innerHTML = renderItemsToHtml(timelineItems, currentIndex, endIndex);
                while (tempDiv.firstChild) {
                    fragment.appendChild(tempDiv.firstChild);
                }
                container.appendChild(fragment);
                currentIndex = endIndex;
                const progress = Math.round((currentIndex / timelineItems.length) * 100);
                const pageInfo = document.querySelector('.page-info');
                if (pageInfo) {
                    pageInfo.textContent = `Rendering... ${progress}% (${currentIndex}/${timelineItems.length})`;
                }
                if (currentIndex < timelineItems.length) {
                    requestAnimationFrame(renderBatch);
                } else {
                    if (pageInfo) {
                        pageInfo.textContent = `${timelineItems.length} items loaded`;
                    }
                }
            }
            requestAnimationFrame(renderBatch);
            return '';
        }

        function renderItemsToHtml(timelineItems, startIndex, endIndex) {
            let html = '';
            const uuidPattern = /\[?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\]?/g;
            for (let i = startIndex; i < endIndex; i++) {
                const item = timelineItems[i];
                if (item.type === 'uuid-group') {
                    const groupId = `uuid-group-${i}`;
                    html += `
                        <div class="uuid-group" id="${groupId}">
                            <div class="uuid-group-header" onclick="toggleUUIDGroup('${groupId}')">
                                <div class="uuid-group-header-left">
                                    <span class="uuid-group-toggle">&#9654;</span>
                                    <div class="uuid-group-title">
                                        ${item.firstLogTime}
                                    </div>
                                </div>
                                <div class="uuid-group-count">${item.logs.length} log${item.logs.length !== 1 ? 's' : ''}</div>
                            </div>
                            <div class="uuid-group-logs">
                                ${item.logs.map(log => {
                        const cleanMessage = log.message.replace(uuidPattern, '').trim();
                        const pktTime = toPakistanTime(log.timestamp);
                        return `
                                    <div class="log-entry">
                                        <span class="log-timestamp">[${pktTime}]</span>
                                        <span class="log-message">${escapeHtml(cleanMessage)}</span>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    const pktTime = toPakistanTime(item.log.timestamp);
                    html += `
                        <div class="log-entry" style="margin-bottom: 8px;">
                            <span class="log-timestamp">[${pktTime}]</span>
                            <span class="log-message">${escapeHtml(item.log.message)}</span>
                        </div>
                    `;
                }
            }
            return html;
        }

        function renderUUIDGroupsFallback() {
            return `
                <div class="empty-state">
                    <div class="empty-state-icon">&#128237;</div>
                    <div>No logs found</div>
                </div>
            `;
        }

        function toggleUUIDGroup(groupId) {
            const group = document.getElementById(groupId);
            if (group) {
                group.classList.toggle('expanded');
            }
        }

        function updateStats(data) {
            const totalLogsEl = document.getElementById('totalLogs');
            const currentPageEl = document.getElementById('currentPage');
            const timeRangeDisplayEl = document.getElementById('timeRangeDisplay');
            const logCountEl = document.getElementById('logCount');
            if (totalLogsEl) totalLogsEl.textContent = data.logs?.length || 0;
            if (currentPageEl) currentPageEl.textContent = '1';
            if (timeRangeDisplayEl) {
                timeRangeDisplayEl.textContent = document.getElementById('timeRangeSelect').options[document.getElementById('timeRangeSelect').selectedIndex].text.replace('Last ', '');
            }
            if (logCountEl) logCountEl.textContent = `${data.logs?.length || 0} logs`;
        }

        function nextPage() {
            if (currentPage < totalPages) {
                fetchLogs(currentPage + 1);
            }
        }

        function previousPage() {
            if (currentPage > 1) {
                fetchLogs(currentPage - 1);
            }
        }

        function goToPage(page) {
            if (page >= 1 && page <= totalPages) {
                fetchLogs(page);
            }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('timeRangeSelect').selectedIndex = 0;
            document.getElementById('customRangeContainer').classList.remove('active');
            customHours = null;
            currentPage = 1;
            fetchLogs();
        }

        function exportLogs() {
            if (!allLogs || allLogs.length === 0) {
                showToast('No logs to export', 'error');
                return;
            }
            const blob = new Blob([
                allLogs.map(log => `[${log.formatted_time}] ${log.message}`).join('\n')
            ], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cloudwatch_logs_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            showToast('Logs exported');
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ?
                'rgba(251, 113, 133, 0.9)' : 'rgba(52, 211, 153, 0.9)';
            toast.style.color = type === 'error' ? '#fff' : '#1a1512';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function applySearchFilter() {
            if (allLogsUnfiltered.length > 0) {
                displayLogs({ logs: allLogsUnfiltered });
            } else {
                fetchLogs(1);
            }
        }

        const debouncedSearch = debounce(() => {
            currentPage = 1;
            applySearchFilter();
        }, 500);

        document.getElementById('searchInput').addEventListener('input', debouncedSearch);

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(searchDebounceTimer);
                currentPage = 1;
                applySearchFilter();
            }
        });

        document.getElementById('timeRangeSelect').addEventListener('change', (e) => {
            const customContainer = document.getElementById('customRangeContainer');
            if (e.target.value === 'custom') {
                customContainer.classList.add('active');
            } else {
                customContainer.classList.remove('active');
                customHours = null;
                currentPage = 1;
                fetchLogs(1);
            }
        });

        function applyCustomRange() {
            const value = parseInt(document.getElementById('customRangeValue').value) || 1;
            const unit = document.getElementById('customRangeUnit').value;
            if (value < 1) {
                showToast('Please enter a valid number', 'error');
                return;
            }
            customHours = unit === 'days' ? value * 24 : value;
            const timeRangeDisplay = document.getElementById('timeRangeDisplay');
            if (timeRangeDisplay) {
                timeRangeDisplay.textContent = unit === 'days' ? `${value}d` : `${value}h`;
            }
            currentPage = 1;
            fetchLogs(1);
            showToast(`Showing logs for last ${value} ${unit}`);
        }

        const logSourceSelect = document.getElementById('logSourceSelect');
        if (logSourceSelect) {
            logSourceSelect.addEventListener('change', (e) => {
                currentPage = 1;
                fetchLogs(1);
            });
        }

        fetchLogs(1);
    </script>
</body>

</html>
