<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudWatch Logs Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Header Section */
        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metadata {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .metadata-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .metadata-value {
            color: #667eea;
            font-weight: 500;
        }

        /* Filters Section */
        .filters {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        input,
        select {
            padding: 10px 14px;
            background: #2d3748;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        select option {
            background: #2d3748;
            color: white;
            padding: 10px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: #374151;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Logs Container */
        .logs-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }

        .logs-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logs-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .logs-scroll {
            max-height: 600px;
            overflow-y: auto;
            padding: 16px;
        }

        .logs-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .logs-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .logs-scroll::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 4px;
        }

        .logs-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.7);
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            transition: all 0.2s ease;
            animation: fadeInLog 0.3s ease-out;
        }

        @keyframes fadeInLog {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .log-timestamp {
            color: #667eea;
            font-weight: 500;
            margin-right: 12px;
        }

        .log-message {
            color: rgba(255, 255, 255, 0.85);
            word-break: break-word;
        }

        .uuid-group {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(102, 126, 234, 0.4);
            border-radius: 12px;
            margin-bottom: 16px;
            animation: fadeInLog 0.3s ease-out;
            overflow: hidden;
        }

        .uuid-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(102, 126, 234, 0.2);
            border-left: 4px solid #667eea;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease;
        }

        .uuid-group-header:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .uuid-group-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .uuid-group-toggle {
            font-size: 12px;
            transition: transform 0.3s ease;
            color: #667eea;
        }

        .uuid-group.expanded .uuid-group-toggle {
            transform: rotate(90deg);
        }

        .uuid-group-title {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .uuid-group-count {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .uuid-group-logs {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.1);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }

            to {
                opacity: 1;
                max-height: 2000px;
            }
        }

        .uuid-group.expanded .uuid-group-logs {
            display: flex;
        }

        .uuid-group .log-entry {
            margin-bottom: 0;
            background: rgba(255, 255, 255, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            display: none;
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .navbar {
                padding: 12px 16px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">☁️</div>
            <span class="logo-text">CloudWatch Logs</span>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </nav>


    <div class="container">

        <div class="header">
            <h1>📊 Logs Dashboard</h1>
            <div class="metadata">
                <div class="metadata-item">
                    <span>📁 Log Group:</span>
                    <span class="metadata-value">{{ log_group }}</span>
                </div>
                <div class="metadata-item">
                    <span>🌍 Region:</span>
                    <span class="metadata-value">{{ region }}</span>
                </div>
            </div>
        </div>


        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalLogs">0</div>
                <div class="stat-label">Total Logs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPage">1</div>
                <div class="stat-label">Current Page</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeRangeDisplay">1h</div>
                <div class="stat-label">Time Range</div>
            </div>
        </div>


        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>🔍 Search Logs</label>
                    <input type="text" id="searchInput" placeholder="Search by keyword...">
                </div>
                <div class="filter-group">
                    <label>⏰ Time Range</label>
                    <select id="timeRangeSelect">
                        <option value="1">Last 1 hour</option>
                        <option value="6">Last 6 hours</option>
                        <option value="24">Last 24 hours</option>
                        <option value="48">Last 2 days</option>
                        <option value="168">Last 7 days</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📄 Results Per Page</label>
                    <select id="pageSizeSelect">
                        <option value="25">25 logs</option>
                        <option value="50" selected>50 logs</option>
                        <option value="100">100 logs</option>
                        <option value="200">200 logs</option>
                        <option value="500">500 logs</option>
                    </select>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="fetchLogs()">
                    🔄 Refresh Logs
                </button>
                <button class="btn btn-secondary" onclick="clearFilters()">
                    ✖️ Clear Filters
                </button>
                <button class="btn btn-secondary" onclick="exportLogs()">
                    💾 Export
                </button>
                <button class="btn btn-primary" onclick="window.location.href='/app-logs'">
                    📱 App Logs
                </button>
                <button class="btn btn-primary" onclick="window.location.href='/audio-files'">
                    🎵 Audio Files
                </button>
                <button class="btn btn-primary" onclick="window.location.href='/database'">
                    🗄️ Database
                </button>
            </div>
        </div>


        <div class="logs-container">
            <div class="logs-header">
                <h2>📝 Log Entries</h2>
                <span id="logCount">Loading...</span>
            </div>
            <div class="logs-scroll" id="logsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading logs...</div>
                </div>
            </div>
            <div class="pagination">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousPage()" disabled>
                    ← Previous
                </button>
                <span class="page-info">Page <span id="pageNumber">1</span> of <span id="totalPages">1</span></span>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" disabled>
                    Next →
                </button>
            </div>
        </div>
    </div>


    <div class="toast" id="toast"></div>

    <script>

        let currentPage = 1;
        let totalPages = 1;
        let allLogs = [];
        let isLoading = false;
        let searchDebounceTimer = null;
        const token = localStorage.getItem('access_token');
        let pageSize = 50;


        if (!token) {
            window.location.href = '/login';
        }

        // Check if user has access to dashboard (ubl-test-team is restricted)
        async function checkDashboardAccess() {
            try {
                const response = await fetch('/api/user/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    if (userData.role === 'ubl-test-team') {
                        // Redirect ubl-test-team to app-logs instead
                        window.location.href = '/app-logs';
                        return false;
                    }
                } else if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return false;
                }
            } catch (error) {
                console.error('Error checking access:', error);
            }
            return true;
        }

        // Check access on page load
        checkDashboardAccess();


        function debounce(func, delay) {
            return function (...args) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // Convert timestamp to Pakistan time (UTC+5)
        function toPakistanTime(timestamp) {
            // timestamp is in milliseconds from the backend
            const date = new Date(timestamp);

            // Format in Pakistan timezone (Asia/Karachi = UTC+5)
            const options = {
                timeZone: 'Asia/Karachi',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };

            const formatter = new Intl.DateTimeFormat('en-CA', options);
            const parts = formatter.formatToParts(date);

            const dateParts = {};
            parts.forEach(part => {
                dateParts[part.type] = part.value;
            });

            return `${dateParts.year}-${dateParts.month}-${dateParts.day} ${dateParts.hour}:${dateParts.minute}:${dateParts.second}`;
        }


        function showLoading() {
            isLoading = true;
            document.getElementById('logsContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading logs...</div>
                </div>
            `;
        }


        async function fetchLogs(page = 1, showLoadingState = true) {
            if (isLoading && showLoadingState) return;

            const hours = document.getElementById('timeRangeSelect').value || '1';
            const search = document.getElementById('searchInput').value.trim();

            // Fetch ALL logs at once to ensure proper UUID grouping (no pagination split)
            const fetchLimit = 10000;
            const fetchPageSize = 10000;

            currentPage = 1;

            if (showLoadingState) {
                showLoading();
            }

            try {
                let url = `/api/logs?hours=${hours}&limit=${fetchLimit}&page=1&page_size=${fetchPageSize}`;
                if (search) {
                    url += `&search=${encodeURIComponent(search)}`;
                }

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                allLogs = data.logs;
                totalPages = 1;

                displayLogs(data);
                updateStats(data);

                // Hide pagination since we're fetching all logs
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const pageInfo = document.querySelector('.page-info');
                if (prevBtn) prevBtn.style.display = 'none';
                if (nextBtn) nextBtn.style.display = 'none';
                if (pageInfo) pageInfo.textContent = `${data.logs?.length || 0} logs loaded`;

                showToast('✓ Logs refreshed');
            } catch (error) {
                console.error('Error fetching logs:', error);
                document.getElementById('logsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div>Error loading logs: ${error.message}</div>
                    </div>
                `;
                showToast('✗ Error fetching logs', 'error');
            } finally {
                isLoading = false;
            }
        }


        function displayLogs(data) {
            const container = document.getElementById('logsContainer');

            if (!data.logs || data.logs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div>No logs found for the selected criteria</div>
                    </div>
                `;
                return;
            }

            const uuidGroups = groupLogsByUUID(data.logs);
            container.innerHTML = renderUUIDGroups(uuidGroups);
        }

        function groupLogsByUUID(logs) {
            const uuidRegex = /\[([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})\]/g;
            const groups = {};
            const noUUIDLogs = [];
            const processedLogIds = new Set();

            logs.forEach((log, index) => {
                const matches = [...log.message.matchAll(uuidRegex)];
                if (matches && matches.length > 0) {
                    const uuid = matches[0][1]; // Use first UUID found
                    if (!groups[uuid]) {
                        groups[uuid] = [];
                    }
                    groups[uuid].push({ ...log, _index: index });
                    processedLogIds.add(index);
                }
            });

            // Collect non-UUID logs
            logs.forEach((log, index) => {
                if (!processedLogIds.has(index)) {
                    noUUIDLogs.push({ ...log, _index: index });
                }
            });

            // Sort logs within each UUID group by timestamp (newest first)
            Object.keys(groups).forEach(uuid => {
                groups[uuid].sort((a, b) => b.timestamp - a.timestamp);
            });

            return { groups, noUUIDLogs };
        }

        function renderUUIDGroups(uuidGroups) {
            // Create a timeline of items (UUID groups and individual non-UUID logs)
            const timelineItems = [];

            // Add UUID groups with their most recent timestamp
            Object.keys(uuidGroups.groups).forEach(uuid => {
                const logs = uuidGroups.groups[uuid];
                const mostRecentTimestamp = logs[0]?.timestamp || 0;
                const firstLogTime = logs[0]?.timestamp ? toPakistanTime(logs[0].timestamp) : 'Unknown time';
                timelineItems.push({
                    type: 'uuid-group',
                    uuid: uuid,
                    logs: logs,
                    timestamp: mostRecentTimestamp,
                    firstLogTime: firstLogTime
                });
            });

            // Add individual non-UUID logs
            uuidGroups.noUUIDLogs.forEach(log => {
                timelineItems.push({
                    type: 'single-log',
                    log: log,
                    timestamp: log.timestamp
                });
            });

            // Sort all items by timestamp descending (newest first)
            timelineItems.sort((a, b) => b.timestamp - a.timestamp);

            // Render the timeline
            let html = '';
            const uuidPattern = /\[?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\]?/g;
            let groupIndex = 0;

            timelineItems.forEach(item => {
                if (item.type === 'uuid-group') {
                    const groupId = `uuid-group-${groupIndex++}`;
                    html += `
                        <div class="uuid-group" id="${groupId}">
                            <div class="uuid-group-header" onclick="toggleUUIDGroup('${groupId}')">
                                <div class="uuid-group-header-left">
                                    <span class="uuid-group-toggle">▶</span>
                                    <div class="uuid-group-title">
                                        📅 ${item.firstLogTime}
                                    </div>
                                </div>
                                <div class="uuid-group-count">${item.logs.length} log${item.logs.length !== 1 ? 's' : ''}</div>
                            </div>
                            <div class="uuid-group-logs">
                                ${item.logs.map(log => {
                        // Remove UUID from message since it's shown in header
                        const cleanMessage = log.message.replace(uuidPattern, '').trim();
                        const pktTime = toPakistanTime(log.timestamp);
                        return `
                                    <div class="log-entry">
                                        <span class="log-timestamp">[${pktTime}]</span>
                                        <span class="log-message">${escapeHtml(cleanMessage)}</span>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    const pktTime = toPakistanTime(item.log.timestamp);
                    html += `
                        <div class="log-entry" style="margin-bottom: 8px;">
                            <span class="log-timestamp">[${pktTime}]</span>
                            <span class="log-message">${escapeHtml(item.log.message)}</span>
                        </div>
                    `;
                }
            });

            return html || `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>No logs found</div>
                </div>
            `;
        }

        function toggleUUIDGroup(groupId) {
            const group = document.getElementById(groupId);
            if (group) {
                group.classList.toggle('expanded');
            }
        }



        function updateStats(data) {
            const totalLogsEl = document.getElementById('totalLogs');
            const currentPageEl = document.getElementById('currentPage');
            const timeRangeDisplayEl = document.getElementById('timeRangeDisplay');
            const logCountEl = document.getElementById('logCount');

            if (totalLogsEl) totalLogsEl.textContent = data.logs?.length || 0;
            if (currentPageEl) currentPageEl.textContent = '1';
            if (timeRangeDisplayEl) {
                timeRangeDisplayEl.textContent = document.getElementById('timeRangeSelect').options[document.getElementById('timeRangeSelect').selectedIndex].text.replace('Last ', '');
            }
            if (logCountEl) logCountEl.textContent = `${data.logs?.length || 0} logs`;
        }


        function nextPage() {
            if (currentPage < totalPages) {
                fetchLogs(currentPage + 1);
            }
        }

        function previousPage() {
            if (currentPage > 1) {
                fetchLogs(currentPage - 1);
            }
        }


        function goToPage(page) {
            if (page >= 1 && page <= totalPages) {
                fetchLogs(page);
            }
        }


        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('timeRangeSelect').selectedIndex = 0;
            document.getElementById('pageSizeSelect').selectedIndex = 1;
            pageSize = 50;
            currentPage = 1;
            fetchLogs();
        }


        function exportLogs() {
            if (!allLogs || allLogs.length === 0) {
                showToast('No logs to export', 'error');
                return;
            }

            const blob = new Blob([
                allLogs.map(log => `[${log.formatted_time}] ${log.message}`).join('\n')
            ], { type: 'text/plain' });

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cloudwatch_logs_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);

            showToast('✓ Logs exported');
        }


        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }


        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ?
                'rgba(239, 68, 68, 0.9)' : 'rgba(16, 185, 129, 0.9)';
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }


        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }


        const debouncedSearch = debounce(() => {
            currentPage = 1;
            fetchLogs(1);
        }, 500);


        document.getElementById('searchInput').addEventListener('input', debouncedSearch);

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(searchDebounceTimer);
                currentPage = 1;
                fetchLogs(1);
            }
        });


        document.getElementById('timeRangeSelect').addEventListener('change', () => {
            currentPage = 1;
            fetchLogs(1);
        });


        document.getElementById('pageSizeSelect').addEventListener('change', (e) => {
            pageSize = parseInt(e.target.value);
            currentPage = 1;
            fetchLogs(1);
        });


        fetchLogs(1);
    </script>
</body>

</html>
