<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary - CloudWatch</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/hearth.css">
    <style>
        .summary-container {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        .summary-header {
            background: var(--bg-elevated);
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
        }
        .summary-scroll {
            max-height: 700px;
            overflow-y: auto;
        }
        .summary-scroll::-webkit-scrollbar { width: 6px; }
        .summary-scroll::-webkit-scrollbar-track { background: transparent; }
        .summary-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.25); border-radius: 3px; }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .summary-table thead {
            background: var(--bg-deep);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .summary-table th {
            background: var(--bg-deep);
            padding: 12px 14px;
            text-align: left;
            font-weight: 700;
            color: var(--accent);
            border-bottom: 2px solid var(--border-strong);
            white-space: nowrap;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .summary-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
            cursor: pointer;
        }
        .summary-table tbody tr:hover {
            background: var(--accent-glow);
        }
        .summary-table td {
            padding: 12px 14px;
            vertical-align: top;
        }
        .summary-table .col-time {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--accent-light);
            white-space: nowrap;
            min-width: 150px;
        }
        .summary-table .col-intent {
            font-weight: 700;
            color: var(--success);
            min-width: 110px;
        }
        .summary-table .col-transcription {
            color: var(--text-secondary);
            max-width: 400px;
            word-break: break-word;
        }
        .summary-table .col-final-response {
            color: var(--info);
            max-width: 400px;
            word-break: break-word;
        }
        .summary-table .empty-value {
            color: var(--text-muted);
            font-style: italic;
        }
        @media (max-width: 1024px) {
            .summary-table { display: block; overflow-x: auto; }
        }
        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 100%; max-width: 900px; max-height: 80vh;
            display: flex; flex-direction: column;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        }
        .modal-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 16px; font-weight: 600; color: var(--accent);
            display: flex; align-items: center; gap: 8px;
        }
        .modal-uuid {
            font-family: 'Fira Code', monospace;
            font-size: 11px; color: var(--uuid-accent);
            background: var(--uuid-bg); padding: 3px 8px;
            border-radius: 6px;
        }
        .modal-close {
            width: 34px; height: 34px;
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s ease;
        }
        .modal-close:hover {
            background: var(--error-bg); border-color: var(--error-border); color: var(--error);
        }
        .modal-body {
            padding: 18px 22px; overflow-y: auto; flex: 1;
        }
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.25); border-radius: 3px; }
        .log-count-badge {
            font-size: 11px;
            background: var(--accent-glow);
            color: var(--accent);
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">&#x1F4CB;</div>
            <span class="logo-text">Summary</span>
        </div>
        <div class="nav-buttons">
            <button class="back-btn" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Call Summary</h1>
            <div class="metadata">
                <div class="metadata-item">
                    <span>Log Group:</span>
                    <span class="metadata-value">{{ log_group }}</span>
                </div>
                <div class="metadata-item">
                    <span>Region:</span>
                    <span class="metadata-value">{{ region }}</span>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalSessions">0</div>
                <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeRangeDisplay">1h</div>
                <div class="stat-label">Time Range</div>
            </div>
        </div>

        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Search</label>
                    <input type="text" id="searchInput" placeholder="Search by transcription or intent...">
                </div>
                <div class="filter-group">
                    <label>Time Range</label>
                    <select id="timeRangeSelect">
                        <option value="1">Last 1 hour</option>
                        <option value="6">Last 6 hours</option>
                        <option value="24">Last 24 hours</option>
                        <option value="48">Last 2 days</option>
                        <option value="168">Last 7 days</option>
                        <option value="336">Last 14 days</option>
                        <option value="720">Last 1 Month</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>
            </div>
            <div class="custom-range-container" id="customRangeContainer">
                <label class="custom-range-label">Custom Range:</label>
                <input type="number" class="custom-range-input" id="customRangeValue" min="1" value="1"
                    placeholder="Value">
                <select class="custom-range-unit" id="customRangeUnit">
                    <option value="hours">Hours</option>
                    <option value="days">Days</option>
                </select>
                <button class="btn btn-primary" onclick="applyCustomRange()">Apply</button>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="fetchSummary()">Refresh</button>
                <button class="btn btn-secondary" onclick="clearFilters()">Clear Filters</button>
                <button class="btn btn-secondary" onclick="exportSummary()">Export</button>
            </div>
        </div>

        <div class="summary-container">
            <div class="summary-header">
                <h2>Session Summaries</h2>
                <span id="summaryCount">Loading...</span>
            </div>
            <div class="summary-scroll" id="summaryContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading summaries...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Logs Modal -->
    <div class="modal-overlay" id="logModal">
        <div class="modal">
            <div class="modal-header">
                <h3>
                    Session Logs
                    <span class="log-count-badge" id="modalLogCount"></span>
                    <span style="display: flex; gap: 10px; margin-left: 8px; font-size: 13px; flex-wrap: wrap;">
                        <span
                            style="background: var(--accent-glow); padding: 3px 10px; border-radius: 6px; color: var(--accent-light); font-size: 12px;">
                            <span id="modalTime"></span>
                        </span>
                        <span class="modal-uuid">
                            <span id="modalUuid"></span>
                        </span>
                    </span>
                </h3>
                <button class="modal-close" onclick="closeLogModal()">&#x2715;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Log entries will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        let allSummaries = [];
        let filteredSummaries = [];
        let uuidLogsMap = {};
        let customHours = null;
        const token = localStorage.getItem('access_token');

        // Regex patterns for parsing logs
        const UUID_PATTERN = /\[([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})\]/;
        const DETECTED_INTENT_PATTERN = /Detected Intent:\s*(\w+)/i;
        const ORIGINAL_TRANSCRIPTION_PATTERN = /Original transcription:\s*(.+)/i;
        const FINAL_RESPONSE_PATTERN = /Final Response:\s*(.+)/i;

        if (!token) {
            window.location.href = '/login';
        }

        function toPakistanTime(timestamp) {
            const date = new Date(timestamp);
            const options = {
                timeZone: 'Asia/Karachi',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const formatter = new Intl.DateTimeFormat('en-CA', options);
            const parts = formatter.formatToParts(date);
            const dateParts = {};
            parts.forEach(part => { dateParts[part.type] = part.value; });
            return `${dateParts.year}-${dateParts.month}-${dateParts.day} ${dateParts.hour}:${dateParts.minute}:${dateParts.second}`;
        }

        function showLoading() {
            const hours = customHours || document.getElementById('timeRangeSelect').value;
            let timeInfo = hours >= 720 ? '1 month' : hours >= 336 ? '14 days' : hours >= 168 ? '7 days' : hours >= 24 ? '24 hours' : hours + ' hours';
            let extraMsg = hours >= 168 ? '<div style="margin-top: 8px; font-size: 12px; opacity: 0.7;">Large time ranges may take longer to load...</div>' : '';
            document.getElementById('summaryContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading ${timeInfo} of logs...</div>
                    ${extraMsg}
                </div>
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        let isMonthView = false;

        async function fetchSummary() {
            const hours = parseInt(customHours || document.getElementById('timeRangeSelect').value);
            showLoading();

            try {
                let response;

                // For 7+ days (168 hours), use the filtered /api/summary endpoint (server-side filtering)
                if (hours >= 168) {
                    isMonthView = true;
                    response = await fetch(`/api/summary?hours=${hours}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.status === 401) {
                        localStorage.removeItem('access_token');
                        window.location.href = '/login';
                        return;
                    }

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    const data = await response.json();

                    // Handle cache warming message
                    if (data.cache_warming) {
                        document.getElementById('summaryContainer').innerHTML = `
                            <div class="loading">
                                <div class="spinner"></div>
                                <div style="margin-bottom: 12px;">${data.message || 'Cache is warming up...'}</div>
                                <div style="font-size: 13px; opacity: 0.7;">Auto-retrying in <span id="retryCountdown">30</span> seconds...</div>
                            </div>
                        `;
                        // Auto-retry after 30 seconds
                        let countdown = 30;
                        const countdownEl = document.getElementById('retryCountdown');
                        const countdownInterval = setInterval(() => {
                            countdown--;
                            if (countdownEl) countdownEl.textContent = countdown;
                            if (countdown <= 0) {
                                clearInterval(countdownInterval);
                                fetchSummary();
                            }
                        }, 1000);
                        return;
                    }

                    allSummaries = data.summaries || [];
                    uuidLogsMap = {};

                    updateStats({ total: allSummaries.length });
                    applySearchFilter();
                    showToast(`Summary refreshed (${allSummaries.length} sessions)`);
                } else {
                    // For shorter ranges (<7 days), fetch all logs and process client-side
                    isMonthView = false;
                    response = await fetch(`/api/logs?hours=${hours}&limit=100000&page_size=100000`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.status === 401) {
                        localStorage.removeItem('access_token');
                        window.location.href = '/login';
                        return;
                    }

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    const data = await response.json();
                    const allLogs = data.logs || [];

                    // Process logs client-side to generate summaries
                    const result = processLogsToSummaries(allLogs);
                    allSummaries = result.summaries;
                    uuidLogsMap = result.uuidLogsMap;

                    updateStats({ total: allSummaries.length });
                    applySearchFilter();
                    showToast(`Summary refreshed (${allLogs.length} logs processed)`);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('summaryContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#x26A0;</div>
                        <div>Error loading data: ${error.message}</div>
                    </div>
                `;
            }
        }

        function processLogsToSummaries(logs) {
            const uuidGroups = {};
            const uuidLogsMap = {};

            logs.forEach(log => {
                const message = log.message || '';
                const timestamp = log.timestamp || 0;

                const uuidMatch = message.match(UUID_PATTERN);
                if (uuidMatch) {
                    const uuid = uuidMatch[1];

                    if (!uuidGroups[uuid]) {
                        uuidGroups[uuid] = {
                            uuid: uuid,
                            detected_intent: null,
                            original_transcription: null,
                            final_response: null,
                            timestamp: null,
                            log_count: 0
                        };
                        uuidLogsMap[uuid] = [];
                    }

                    uuidLogsMap[uuid].push(log);
                    uuidGroups[uuid].log_count++;

                    if (!uuidGroups[uuid].timestamp || timestamp > uuidGroups[uuid].timestamp) {
                        uuidGroups[uuid].timestamp = timestamp;
                    }

                    if (!uuidGroups[uuid].detected_intent) {
                        const intentMatch = message.match(DETECTED_INTENT_PATTERN);
                        if (intentMatch) {
                            uuidGroups[uuid].detected_intent = intentMatch[1];
                        }
                    }

                    if (!uuidGroups[uuid].original_transcription) {
                        const transcriptionMatch = message.match(ORIGINAL_TRANSCRIPTION_PATTERN);
                        if (transcriptionMatch) {
                            uuidGroups[uuid].original_transcription = transcriptionMatch[1].trim();
                        }
                    }

                    if (!uuidGroups[uuid].final_response) {
                        const responseMatch = message.match(FINAL_RESPONSE_PATTERN);
                        if (responseMatch) {
                            uuidGroups[uuid].final_response = responseMatch[1].trim();
                        }
                    }
                }
            });

            // Sort logs within each UUID group by timestamp (newest first)
            Object.keys(uuidLogsMap).forEach(uuid => {
                uuidLogsMap[uuid].sort((a, b) => b.timestamp - a.timestamp);
            });

            // Convert to array and sort by timestamp (newest first)
            const summaries = Object.values(uuidGroups);
            summaries.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            return { summaries, uuidLogsMap };
        }

        function updateStats(data) {
            document.getElementById('totalSessions').textContent = data.total || 0;
            const hours = customHours || document.getElementById('timeRangeSelect').value;
            if (customHours) {
                if (customHours >= 24) {
                    document.getElementById('timeRangeDisplay').textContent = Math.floor(customHours / 24) + 'd';
                } else {
                    document.getElementById('timeRangeDisplay').textContent = customHours + 'h';
                }
            } else {
                const ranges = { '1': '1h', '6': '6h', '24': '24h', '48': '2d', '168': '7d', '336': '14d', '720': '1m' };
                document.getElementById('timeRangeDisplay').textContent = ranges[hours] || hours + 'h';
            }
        }

        function applySearchFilter() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            if (query) {
                filteredSummaries = allSummaries.filter(s => {
                    const transcription = s.original_transcription && s.original_transcription.toLowerCase().includes(query);
                    const intent = s.detected_intent && s.detected_intent.toLowerCase().includes(query);
                    const typeFromResponse = extractTypeFromFinalResponse(s.final_response);
                    const typeMatch = typeFromResponse && typeFromResponse.toLowerCase().includes(query);
                    return transcription || intent || typeMatch;
                });
            } else {
                filteredSummaries = allSummaries;
            }

            displaySummaries();
        }

        function extractTypeFromFinalResponse(finalResponse) {
            if (!finalResponse) return null;
            const typeMatch = finalResponse.match(/['"]type['"]\s*:\s*['"]([^'"]+)['"]/);
            if (typeMatch) {
                return typeMatch[1];
            }
            return null;
        }

        function displaySummaries() {
            const container = document.getElementById('summaryContainer');

            if (filteredSummaries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#x1F4ED;</div>
                        <div>No sessions found for the selected time range</div>
                    </div>
                `;
                document.getElementById('summaryCount').textContent = '0 sessions';
                return;
            }

            let html = `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Detected Intent</th>
                            <th>Original Transcription</th>
                            <th>Final Response</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            filteredSummaries.forEach((summary, index) => {
                const time = summary.timestamp ? toPakistanTime(summary.timestamp) : 'Unknown';
                const finalResponse = summary.final_response || null;
                const intent = extractTypeFromFinalResponse(finalResponse) || null;
                const transcription = summary.original_transcription || null;
                const logCount = summary.log_count || 0;

                html += `
                    <tr onclick="showLogModal('${summary.uuid}')" title="Click to view all logs for this session">
                        <td class="col-time">${time}</td>
                        <td class="col-intent">${intent || '<span class="empty-value">-</span>'}</td>
                        <td class="col-transcription">${transcription || '<span class="empty-value">-</span>'}</td>
                        <td class="col-final-response">${finalResponse || '<span class="empty-value">-</span>'}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
            document.getElementById('summaryCount').textContent = `${filteredSummaries.length} sessions`;
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('timeRangeSelect').value = '1';
            customHours = null;
            fetchSummary();
        }

        function exportSummary() {
            if (filteredSummaries.length === 0) {
                showToast('No data to export');
                return;
            }

            const csvRows = ['Time,Detected Intent,Original Transcription,Final Response,Log Count'];
            filteredSummaries.forEach(s => {
                const time = s.timestamp ? toPakistanTime(s.timestamp) : '';
                const transcription = (s.original_transcription || '').replace(/"/g, '""');
                const finalResponse = (s.final_response || '').replace(/"/g, '""');
                const intent = extractTypeFromFinalResponse(s.final_response) || '';
                csvRows.push(`"${time}","${intent}","${transcription}","${finalResponse}","${s.log_count || 0}"`);
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `summary_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported to CSV');
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function showLogModal(uuid) {
            if (!uuid) return;

            const modal = document.getElementById('logModal');
            const modalUuid = document.getElementById('modalUuid');
            const modalLogCount = document.getElementById('modalLogCount');
            const modalBody = document.getElementById('modalBody');

            modalUuid.textContent = uuid;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            let logs = uuidLogsMap[uuid] || [];

            if (logs.length === 0 && isMonthView) {
                modalLogCount.textContent = 'Loading...';
                modalBody.innerHTML = `
                    <div class="loading" style="padding: 40px;">
                        <div class="spinner"></div>
                        <div>Fetching logs for this session...</div>
                    </div>
                `;

                try {
                    const hours = customHours || document.getElementById('timeRangeSelect').value;
                    const response = await fetch(`/api/logs?hours=${hours}&uuid=${uuid}&page_size=50000`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.status === 401) {
                        localStorage.removeItem('access_token');
                        window.location.href = '/login';
                        return;
                    }

                    const data = await response.json();
                    logs = data.logs || [];
                } catch (error) {
                    console.error('Error fetching logs:', error);
                    modalBody.innerHTML = `
                        <div class="empty-state" style="padding: 40px 20px;">
                            <div class="empty-state-icon">&#x26A0;</div>
                            <div>Error loading logs: ${error.message}</div>
                        </div>
                    `;
                    modalLogCount.textContent = 'Error';
                    return;
                }
            }

            modalLogCount.textContent = `${logs.length} logs`;

            if (logs.length === 0) {
                document.getElementById('modalTime').textContent = '';
                modalBody.innerHTML = `
                    <div class="empty-state" style="padding: 40px 20px;">
                        <div class="empty-state-icon">&#x1F4ED;</div>
                        <div>No logs found for this session</div>
                    </div>
                `;
            } else {
                const sessionTime = logs[0]?.timestamp ? toPakistanTime(logs[0].timestamp) : 'Unknown';
                document.getElementById('modalTime').textContent = sessionTime;

                let logsHtml = '';
                logs.forEach(log => {
                    let message = log.message || '';
                    message = message.replace(/\[[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\]/g, '').trim();
                    logsHtml += `
                        <div class="log-entry">
                            <div class="log-message">${escapeHtml(message)}</div>
                        </div>
                    `;
                });
                modalBody.innerHTML = logsHtml;
            }
        }

        function closeLogModal() {
            const modal = document.getElementById('logModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close modal on overlay click or Escape key
        document.getElementById('logModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeLogModal();
            }
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeLogModal();
            }
        });

        // Event listeners
        document.getElementById('timeRangeSelect').addEventListener('change', function () {
            const value = this.value;
            const customContainer = document.getElementById('customRangeContainer');
            if (value === 'custom') {
                customContainer.classList.add('active');
            } else {
                customContainer.classList.remove('active');
                customHours = null;
                fetchSummary();
            }
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(window.searchTimer);
            window.searchTimer = setTimeout(applySearchFilter, 300);
        });

        function applyCustomRange() {
            const value = parseInt(document.getElementById('customRangeValue').value) || 1;
            const unit = document.getElementById('customRangeUnit').value;
            customHours = unit === 'days' ? value * 24 : value;
            customHours = Math.max(1, Math.min(customHours, 720));
            fetchSummary();
        }

        // Initial load
        fetchSummary();
    </script>

</body>

</html>
