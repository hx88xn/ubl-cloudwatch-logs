<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Logs - CloudWatch</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/hearth.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">📱</div>
            <span class="logo-text">App Logs</span>
        </div>
        <div class="nav-buttons">
            <button class="back-btn" id="backBtn" onclick="window.location.href='/dashboard'" style="display: none;">←
                Back to Dashboard</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>


    <div class="container">

        <div class="header">
            <h1><span class="accent-text">Application Logs</span></h1>
            <div class="metadata">
                <div class="metadata-item">
                    <span>Log Group:</span>
                    <span class="metadata-value">{{ log_group }}</span>
                </div>
                <div class="metadata-item">
                    <span>Region:</span>
                    <span class="metadata-value">{{ region }}</span>
                </div>
            </div>
        </div>


        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalLogs">0</div>
                <div class="stat-label">Total App Logs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPage">1</div>
                <div class="stat-label">Current Page</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeRangeDisplay">1h</div>
                <div class="stat-label">Time Range</div>
            </div>
        </div>


        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Search Logs</label>
                    <input type="text" id="searchInput" placeholder="Search by keyword...">
                </div>
                <div class="filter-group">
                    <label>Time Range</label>
                    <select id="timeRangeSelect">
                        <option value="1">Last 1 hour</option>
                        <option value="6">Last 6 hours</option>
                        <option value="24">Last 24 hours</option>
                        <option value="48">Last 2 days</option>
                        <option value="168">Last 7 days</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Log Source</label>
                    <select id="logSourceSelect">
                        <option value="cloudwatch" selected>AWS CloudWatch</option>
                        <option value="grafana">Grafana Loki</option>
                    </select>
                </div>
            </div>
            <div class="custom-range-container" id="customRangeContainer">
                <span class="custom-range-label">Custom Range:</span>
                <input type="number" class="custom-range-input" id="customRangeValue" min="1" value="1"
                    placeholder="Value">
                <select class="custom-range-unit" id="customRangeUnit">
                    <option value="hours">Hours</option>
                    <option value="days">Days</option>
                </select>
                <button class="btn btn-apply-custom" onclick="applyCustomRange()">Apply</button>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="fetchLogs()">
                    Refresh Logs
                </button>
                <button class="btn btn-secondary" onclick="clearFilters()">
                    Clear Filters
                </button>
                <button class="btn btn-secondary" onclick="exportLogs()">
                    Export
                </button>
            </div>
        </div>


        <div class="logs-container">
            <div class="logs-header">
                <h2>App Log Entries</h2>
                <span id="logCount">Loading...</span>
            </div>
            <div class="logs-scroll" id="logsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading app logs...</div>
                </div>
            </div>
            <div class="pagination">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousPage()" disabled>
                    ← Previous
                </button>
                <span class="page-info">Page <span id="pageNumber">1</span> of <span id="totalPages">1</span></span>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" disabled>
                    Next →
                </button>
            </div>
        </div>
    </div>


    <div class="toast" id="toast"></div>

    <script>

        let currentPage = 1;
        let totalPages = 1;
        let allLogs = [];
        let allLogsUnfiltered = [];  // Store unfiltered logs for search
        let isLoading = false;
        let searchDebounceTimer = null;
        const token = localStorage.getItem('access_token');
        let pageSize = 50;
        let currentAbortController = null;  // For cancelling previous requests
        let customHours = null;  // Track custom time range in hours


        if (!token) {
            window.location.href = '/login';
        }

        // Check user role and show back button only for admins
        async function checkUserRole() {
            try {
                const response = await fetch('/api/user/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    if (userData.role !== 'ubl-test-team') {
                        document.getElementById('backBtn').style.display = 'inline-flex';
                    }
                }
            } catch (error) {
                console.error('Error fetching user data:', error);
            }
        }

        // Check role on page load
        checkUserRole();

        // Debounce function for search
        function debounce(func, delay) {
            return function (...args) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // Convert timestamp to Pakistan time (UTC+5)
        function toPakistanTime(timestamp) {
            // timestamp is in milliseconds from the backend
            const date = new Date(timestamp);

            // Format in Pakistan timezone (Asia/Karachi = UTC+5)
            const options = {
                timeZone: 'Asia/Karachi',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };

            const formatter = new Intl.DateTimeFormat('en-CA', options);
            const parts = formatter.formatToParts(date);

            const dateParts = {};
            parts.forEach(part => {
                dateParts[part.type] = part.value;
            });

            return `${dateParts.year}-${dateParts.month}-${dateParts.day} ${dateParts.hour}:${dateParts.minute}:${dateParts.second}`;
        }


        function showLoading() {
            isLoading = true;
            document.getElementById('logsContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading app logs...</div>
                </div>
            `;
        }


        async function fetchLogs(page = 1, showLoadingState = true) {
            // Cancel any previous request
            if (currentAbortController) {
                currentAbortController.abort();
            }

            // Create new AbortController for this request
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;

            const hours = customHours || document.getElementById('timeRangeSelect').value || '1';
            const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();

            // Fetch ALL logs at once to ensure proper UUID grouping (no pagination split)
            const fetchLimit = 500000;
            const fetchPageSize = 500000;

            currentPage = 1;

            if (showLoadingState) {
                showLoading();
            }

            try {
                const logSource = document.getElementById('logSourceSelect') ? document.getElementById('logSourceSelect').value : 'cloudwatch';
                let url = `/api/app-logs?hours=${hours}&limit=${fetchLimit}&page=1&page_size=${fetchPageSize}&source=${logSource}`;

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    signal: signal
                });

                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                allLogsUnfiltered = data.logs;  // Store unfiltered logs

                // Apply client-side search filter (case-insensitive)
                if (searchQuery) {
                    allLogs = allLogsUnfiltered.filter(log =>
                        log.message.toLowerCase().includes(searchQuery)
                    );
                } else {
                    allLogs = allLogsUnfiltered;
                }

                totalPages = 1;

                displayLogs({ logs: allLogs });
                updateStats({ logs: allLogs });

                // Hide pagination since we're fetching all logs
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                const pageInfo = document.querySelector('.page-info');
                if (prevBtn) prevBtn.style.display = 'none';
                if (nextBtn) nextBtn.style.display = 'none';
                if (pageInfo) pageInfo.textContent = `${allLogs.length} logs loaded`;

                showToast('App logs refreshed');
            } catch (error) {
                // Don't show error for aborted requests
                if (error.name === 'AbortError') {
                    console.log('Request cancelled');
                    return;
                }
                console.error('Error fetching app logs:', error);
                document.getElementById('logsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">!</div>
                        <div>Error loading app logs: ${error.message}</div>
                    </div>
                `;
                showToast('Error fetching app logs', 'error');
            } finally {
                isLoading = false;
            }
        }

        // Apply search filter on existing data (without re-fetching)
        // Filters by UUID group - if ANY log in a group matches, show the entire group
        function applySearchFilter() {
            // Just re-display with current search - displayLogs handles filtering
            if (allLogsUnfiltered.length > 0) {
                displayLogs({ logs: allLogsUnfiltered });
            } else {
                fetchLogs(1);
            }
        }


        function displayLogs(data) {
            const container = document.getElementById('logsContainer');
            const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();

            // Use allLogsUnfiltered for grouping to preserve entire UUID groups
            const logsToGroup = allLogsUnfiltered.length > 0 ? allLogsUnfiltered : (data.logs || []);

            if (!logsToGroup || logsToGroup.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">--</div>
                        <div>No app logs found for the selected time range</div>
                    </div>
                `;
                return;
            }

            // First, group ALL logs by UUID (using unfiltered data)
            const uuidGroups = groupLogsByUUID(logsToGroup);

            // If there's a search query, filter to show only groups where at least one log matches
            if (searchQuery) {
                const filteredGroups = {};
                const filteredNoUUIDLogs = [];

                // Filter UUID groups - keep entire group if ANY log matches
                Object.keys(uuidGroups.groups).forEach(uuid => {
                    const groupLogs = uuidGroups.groups[uuid];
                    const hasMatch = groupLogs.some(log =>
                        log.message.toLowerCase().includes(searchQuery)
                    );
                    if (hasMatch) {
                        filteredGroups[uuid] = groupLogs;
                    }
                });

                // Filter non-UUID logs individually
                uuidGroups.noUUIDLogs.forEach(log => {
                    if (log.message.toLowerCase().includes(searchQuery)) {
                        filteredNoUUIDLogs.push(log);
                    }
                });

                const filteredUuidGroups = { groups: filteredGroups, noUUIDLogs: filteredNoUUIDLogs };

                if (Object.keys(filteredGroups).length === 0 && filteredNoUUIDLogs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">?</div>
                            <div>No logs found matching "${searchQuery}"</div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = renderUUIDGroups(filteredUuidGroups);

                // Update displayed count
                const matchingLogsCount = Object.values(filteredGroups).flat().length + filteredNoUUIDLogs.length;
                const pageInfo = document.querySelector('.page-info');
                if (pageInfo) pageInfo.textContent = `${matchingLogsCount} logs in ${Object.keys(filteredGroups).length} groups`;
            } else {
                container.innerHTML = renderUUIDGroups(uuidGroups);
            }
        }

        function groupLogsByUUID(logs) {
            const uuidRegex = /\[([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})\]/g;
            const groups = {};
            const noUUIDLogs = [];
            const processedLogIds = new Set();

            logs.forEach((log, index) => {
                const matches = [...log.message.matchAll(uuidRegex)];
                if (matches && matches.length > 0) {
                    const uuid = matches[0][1]; // Use first UUID found
                    if (!groups[uuid]) {
                        groups[uuid] = [];
                    }
                    groups[uuid].push({ ...log, _index: index });
                    processedLogIds.add(index);
                }
            });

            // Collect non-UUID logs
            logs.forEach((log, index) => {
                if (!processedLogIds.has(index)) {
                    noUUIDLogs.push({ ...log, _index: index });
                }
            });

            // Sort logs within each UUID group by timestamp (newest first)
            Object.keys(groups).forEach(uuid => {
                groups[uuid].sort((a, b) => b.timestamp - a.timestamp);
            });

            return { groups, noUUIDLogs };
        }

        function renderUUIDGroups(uuidGroups) {
            // Create a timeline of items (UUID groups and individual non-UUID logs)
            const timelineItems = [];

            // Add UUID groups with their most recent timestamp
            Object.keys(uuidGroups.groups).forEach(uuid => {
                const logs = uuidGroups.groups[uuid];
                const mostRecentTimestamp = logs[0]?.timestamp || 0;
                const firstLogTime = logs[0]?.timestamp ? toPakistanTime(logs[0].timestamp) : 'Unknown time';
                timelineItems.push({
                    type: 'uuid-group',
                    uuid: uuid,
                    logs: logs,
                    timestamp: mostRecentTimestamp,
                    firstLogTime: firstLogTime
                });
            });

            // Add individual non-UUID logs
            uuidGroups.noUUIDLogs.forEach(log => {
                timelineItems.push({
                    type: 'single-log',
                    log: log,
                    timestamp: log.timestamp
                });
            });

            // Sort all items by timestamp descending (newest first)
            timelineItems.sort((a, b) => b.timestamp - a.timestamp);

            // Use progressive rendering for large datasets
            if (timelineItems.length > 100) {
                return renderProgressively(timelineItems);
            }

            // For small datasets, render immediately
            return renderItemsToHtml(timelineItems, 0, timelineItems.length);
        }

        // Render items in batches to avoid blocking the UI
        function renderProgressively(timelineItems) {
            const container = document.getElementById('logsContainer');
            const batchSize = 50;
            let currentIndex = 0;

            // Clear container
            container.innerHTML = '';

            function renderBatch() {
                const fragment = document.createDocumentFragment();
                const tempDiv = document.createElement('div');

                const endIndex = Math.min(currentIndex + batchSize, timelineItems.length);
                tempDiv.innerHTML = renderItemsToHtml(timelineItems, currentIndex, endIndex);

                while (tempDiv.firstChild) {
                    fragment.appendChild(tempDiv.firstChild);
                }

                container.appendChild(fragment);
                currentIndex = endIndex;

                // Update progress
                const progress = Math.round((currentIndex / timelineItems.length) * 100);
                const pageInfo = document.querySelector('.page-info');
                if (pageInfo) {
                    pageInfo.textContent = `Rendering... ${progress}% (${currentIndex}/${timelineItems.length})`;
                }

                // Continue rendering if more items remain
                if (currentIndex < timelineItems.length) {
                    requestAnimationFrame(renderBatch);
                } else {
                    if (pageInfo) {
                        pageInfo.textContent = `${timelineItems.length} items loaded`;
                    }
                }
            }

            requestAnimationFrame(renderBatch);
            return '';
        }

        // Helper function to render a range of items to HTML
        function renderItemsToHtml(timelineItems, startIndex, endIndex) {
            let html = '';
            const uuidPattern = /\[?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\]?/g;

            for (let i = startIndex; i < endIndex; i++) {
                const item = timelineItems[i];

                if (item.type === 'uuid-group') {
                    const groupId = `uuid-group-${i}`;
                    html += `
                        <div class="uuid-group" id="${groupId}">
                            <div class="uuid-group-header" onclick="toggleUUIDGroup('${groupId}')">
                                <div class="uuid-group-header-left">
                                    <span class="uuid-group-toggle">▶</span>
                                    <div class="uuid-group-title">
                                        ${item.firstLogTime}
                                    </div>
                                </div>
                                <div class="uuid-group-count">${item.logs.length} log${item.logs.length !== 1 ? 's' : ''}</div>
                            </div>
                            <div class="uuid-group-logs">
                                ${item.logs.map(log => {
                        const cleanMessage = log.message.replace(uuidPattern, '').trim();
                        const pktTime = toPakistanTime(log.timestamp);
                        return `
                                    <div class="log-entry">
                                        <span class="log-timestamp">[${pktTime}]</span>
                                        <span class="log-message">${escapeHtml(cleanMessage)}</span>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    const pktTime = toPakistanTime(item.log.timestamp);
                    html += `
                        <div class="log-entry" style="margin-bottom: 8px;">
                            <span class="log-timestamp">[${pktTime}]</span>
                            <span class="log-message">${escapeHtml(item.log.message)}</span>
                        </div>
                    `;
                }
            }

            return html || `
                <div class="empty-state">
                    <div class="empty-state-icon">--</div>
                    <div>No logs found</div>
                </div>
            `;
        }

        function toggleUUIDGroup(groupId) {
            const group = document.getElementById(groupId);
            if (group) {
                group.classList.toggle('expanded');
            }
        }


        function updateStats(data) {
            const totalLogsEl = document.getElementById('totalLogs');
            const currentPageEl = document.getElementById('currentPage');
            const timeRangeDisplayEl = document.getElementById('timeRangeDisplay');
            const logCountEl = document.getElementById('logCount');

            if (totalLogsEl) totalLogsEl.textContent = data.logs?.length || 0;
            if (currentPageEl) currentPageEl.textContent = '1';
            if (timeRangeDisplayEl) {
                timeRangeDisplayEl.textContent = document.getElementById('timeRangeSelect').options[document.getElementById('timeRangeSelect').selectedIndex].text.replace('Last ', '');
            }
            if (logCountEl) logCountEl.textContent = `${data.logs?.length || 0} logs`;
        }


        function nextPage() {
            if (currentPage < totalPages) {
                fetchLogs(currentPage + 1);
            }
        }

        function previousPage() {
            if (currentPage > 1) {
                fetchLogs(currentPage - 1);
            }
        }


        function exportLogs() {
            if (!allLogs || allLogs.length === 0) {
                showToast('No app logs to export', 'error');
                return;
            }

            const blob = new Blob([
                allLogs.map(log => `[${log.formatted_time}] ${log.message}`).join('\n')
            ], { type: 'text/plain' });

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `app_logs_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);

            showToast('App logs exported');
        }


        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }


        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (type === 'error' ? ' error' : '');

            setTimeout(() => {
                toast.className = 'toast';
            }, 2000);
        }


        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('timeRangeSelect').selectedIndex = 0;
            document.getElementById('customRangeContainer').classList.remove('active');
            customHours = null;
            pageSize = 50;
            currentPage = 1;
            fetchLogs();
        }

        // Debounced search handler
        const debouncedSearch = debounce(() => {
            if (allLogsUnfiltered.length > 0) {
                applySearchFilter();
            } else {
                fetchLogs(1);
            }
        }, 500);

        // Search input event listeners
        document.getElementById('searchInput').addEventListener('input', debouncedSearch);

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(searchDebounceTimer);
                if (allLogsUnfiltered.length > 0) {
                    applySearchFilter();
                } else {
                    fetchLogs(1);
                }
            }
        });

        document.getElementById('timeRangeSelect').addEventListener('change', (e) => {
            const customContainer = document.getElementById('customRangeContainer');
            if (e.target.value === 'custom') {
                customContainer.classList.add('active');
                // Don't fetch yet, wait for user to apply
            } else {
                customContainer.classList.remove('active');
                customHours = null;
                currentPage = 1;
                fetchLogs(1);
            }
        });

        // Apply custom time range
        function applyCustomRange() {
            const value = parseInt(document.getElementById('customRangeValue').value) || 1;
            const unit = document.getElementById('customRangeUnit').value;

            if (value < 1) {
                showToast('Please enter a valid number', 'error');
                return;
            }

            // Convert to hours
            customHours = unit === 'days' ? value * 24 : value;

            // Update the display
            const timeRangeDisplay = document.getElementById('timeRangeDisplay');
            if (timeRangeDisplay) {
                timeRangeDisplay.textContent = unit === 'days' ? `${value}d` : `${value}h`;
            }

            currentPage = 1;
            fetchLogs(1);
            showToast(`Showing logs for last ${value} ${unit}`);
        }

        const logSourceSelect = document.getElementById('logSourceSelect');
        if (logSourceSelect) {
            logSourceSelect.addEventListener('change', (e) => {
                currentPage = 1;
                fetchLogs(1);
            });
        }


        fetchLogs(1);
    </script>
</body>

</html>
