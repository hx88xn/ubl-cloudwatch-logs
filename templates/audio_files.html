<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Files - S3</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Header Section */
        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metadata {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .metadata-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .metadata-value {
            color: #667eea;
            font-weight: 500;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Filters Section */
        .filters {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        input,
        select {
            padding: 10px 14px;
            background: #2d3748;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        select option {
            background: #2d3748;
            color: white;
            padding: 10px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: #374151;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Files Container */
        .files-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }

        .files-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .files-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .files-scroll {
            max-height: 600px;
            overflow-y: auto;
            padding: 16px;
        }

        .files-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .files-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .files-scroll::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 4px;
        }

        .files-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.7);
        }

        /* Audio File Card */
        .audio-file {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s ease;
            animation: fadeInFile 0.3s ease-out;
        }

        @keyframes fadeInFile {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .audio-file:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .audio-icon {
            font-size: 32px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .audio-info {
            flex: 1;
            min-width: 0;
        }

        .audio-name {
            font-size: 15px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .audio-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .audio-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .btn-play {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #10b981;
        }

        .btn-play:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .btn-download {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #3b82f6;
        }

        .btn-download:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        /* Audio Player */
        .audio-player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 33, 62, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 32px;
            display: none;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }

        .audio-player-container.active {
            display: flex;
        }

        .player-info {
            flex: 0 0 200px;
            min-width: 0;
        }

        .player-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .player-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-audio {
            width: 100%;
            height: 32px;
        }

        .player-audio::-webkit-media-controls-panel {
            background: rgba(255, 255, 255, 0.1);
        }

        .player-close {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .player-close:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            display: none;
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .navbar {
                padding: 12px 16px;
            }

            .header h1 {
                font-size: 24px;
            }

            .audio-file {
                flex-direction: column;
                align-items: flex-start;
            }

            .audio-actions {
                width: 100%;
                justify-content: flex-end;
            }

        .audio-player-container {
            flex-direction: column;
            padding: 16px;
        }

        .player-info {
            flex: none;
            width: 100%;
        }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">🎵</div>
            <span class="logo-text">Audio Files</span>
        </div>
        <div class="nav-buttons">
            <button class="back-btn" onclick="window.location.href='/dashboard'">← Back to Dashboard</button>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </nav>


    <div class="container">

        <div class="header">
            <h1>🎵 S3 Audio Files</h1>
            <div class="metadata">
                <div class="metadata-item">
                    <span>📦 Bucket:</span>
                    <span class="metadata-value">{{ bucket }}</span>
                </div>
                <div class="metadata-item">
                    <span>🌍 Region:</span>
                    <span class="metadata-value">{{ region }}</span>
                </div>
            </div>
        </div>


        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">Total Audio Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPage">1</div>
                <div class="stat-label">Current Page</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPages">1</div>
                <div class="stat-label">Total Pages</div>
            </div>
        </div>


        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>🔍 Search Files</label>
                    <input type="text" id="searchInput" placeholder="Search by filename...">
                </div>
                <div class="filter-group">
                    <label>📄 Results Per Page</label>
                    <select id="pageSizeSelect">
                        <option value="25">25 files</option>
                        <option value="50" selected>50 files</option>
                        <option value="100">100 files</option>
                    </select>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="fetchFiles()">
                    🔄 Refresh Files
                </button>
                <button class="btn btn-secondary" onclick="clearSearch()">
                    ✖️ Clear Search
                </button>
            </div>
        </div>


        <div class="files-container">
            <div class="files-header">
                <h2>📁 Audio Files</h2>
                <span id="fileCount">Loading...</span>
            </div>
            <div class="files-scroll" id="filesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading audio files...</div>
                </div>
            </div>
            <div class="pagination">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousPage()" disabled>
                    ← Previous
                </button>
                <span class="page-info">Page <span id="pageNumber">1</span> of <span id="totalPagesInfo">1</span></span>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" disabled>
                    Next →
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Player -->
    <div class="audio-player-container" id="audioPlayer">
        <div class="player-info">
            <div class="player-title" id="playerTitle">No file selected</div>
            <div class="player-subtitle">Now Playing</div>
        </div>
        <div class="player-controls">
            <audio class="player-audio" id="audioElement" controls></audio>
        </div>
        <button class="player-close" onclick="closePlayer()">✕</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>

        let currentPage = 1;
        let totalPages = 1;
        let allFiles = [];
        let fileCatalog = [];
        let isLoading = false;
        let searchDebounceTimer = null;
        const token = localStorage.getItem('access_token');
        let pageSize = 50;


        if (!token) {
            window.location.href = '/login';
        }

        // Debounce function for search
        function debounce(func, delay) {
            return function (...args) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function showLoading() {
            isLoading = true;
            document.getElementById('filesContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div id="loadingStatus">Loading audio files...</div>
                </div>
            `;
        }

        function setLoadingStatus(text) {
            const el = document.getElementById('loadingStatus');
            if (el) el.textContent = text;
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        async function fastApiErrorDetail(response, fallback) {
            if (response.status === 504) {
                const ct = response.headers.get('content-type') || '';
                if (ct.includes('application/json')) {
                    try {
                        const body = await response.json();
                        if (typeof body.detail === 'string') return body.detail;
                    } catch (_) { /* ignore */ }
                }
                return 'Gateway timeout (504). Listing the whole S3 bucket usually exceeds the proxy limit. Set S3_AUDIO_PREFIX on the server, ensure S3_AUDIO_LISTING_TIMEOUT_SECONDS finishes before the load balancer times out, or increase the ALB/nginx upstream timeout.';
            }
            const ct = response.headers.get('content-type') || '';
            if (!ct.includes('application/json')) {
                return fallback || `HTTP ${response.status}`;
            }
            try {
                const body = await response.json();
                if (typeof body.detail === 'string') return body.detail;
                if (Array.isArray(body.detail)) {
                    return body.detail.map((d) => (d.msg != null ? d.msg : JSON.stringify(d))).join('; ');
                }
                if (body.detail != null) return String(body.detail);
            } catch (_) { /* ignore */ }
            return fallback || `HTTP ${response.status}`;
        }

        function getFilteredFiles() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!q) return fileCatalog;
            return fileCatalog.filter((f) => f.name.toLowerCase().includes(q));
        }

        function applyLocalPagination() {
            const filtered = getFilteredFiles();
            const total = filtered.length;
            totalPages = total === 0 ? 1 : Math.ceil(total / pageSize);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            const start = (currentPage - 1) * pageSize;
            allFiles = filtered.slice(start, start + pageSize);

            document.getElementById('totalFiles').textContent = total.toLocaleString();
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            if (total === 0) {
                document.getElementById('fileCount').textContent =
                    fileCatalog.length === 0 ? 'No files loaded' : 'No files match';
            } else {
                const end = start + allFiles.length;
                document.getElementById('fileCount').textContent =
                    `Showing ${(start + 1).toLocaleString()}–${end.toLocaleString()} of ${total.toLocaleString()} files`;
            }
            renderFiles();
            updatePagination();
        }

        async function fetchFiles() {
            if (isLoading) return;

            showLoading();
            pageSize = parseInt(document.getElementById('pageSizeSelect').value);

            try {
                const merged = [];
                let s3Token = null;
                let chunk = 0;
                const maxChunks = 100000;
                let listingComplete = false;

                while (chunk < maxChunks) {
                    chunk += 1;
                    let url = '/api/s3/audio-files';
                    if (s3Token) {
                        url += '?s3_continuation_token=' + encodeURIComponent(s3Token);
                    }

                    const response = await fetch(url, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.status === 401) {
                        localStorage.removeItem('access_token');
                        window.location.href = '/login';
                        return;
                    }

                    if (!response.ok) {
                        const detail = await fastApiErrorDetail(response, 'Failed to fetch files');
                        throw new Error(detail);
                    }

                    const data = await response.json();
                    merged.push(...data.files);
                    listingComplete = !!data.listing_complete;
                    setLoadingStatus(
                        listingComplete
                            ? `Loaded ${merged.length.toLocaleString()} audio files`
                            : `Scanning… ${merged.length.toLocaleString()} audio files so far`
                    );

                    if (listingComplete) break;
                    s3Token = data.next_s3_continuation_token;
                    if (!s3Token) break;
                }

                if (!listingComplete) {
                    showToast('Scan stopped before the bucket was fully listed (limit reached).', true);
                }

                merged.sort((a, b) => (a.last_modified < b.last_modified ? 1 : a.last_modified > b.last_modified ? -1 : 0));
                fileCatalog = merged;
                currentPage = 1;
                applyLocalPagination();

            } catch (error) {
                console.error('Error fetching files:', error);
                showToast('Error fetching files: ' + error.message, true);
                document.getElementById('filesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div>Error loading audio files</div>
                        <div style="margin-top: 8px; font-size: 12px;">${escapeHtml(error.message)}</div>
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        function renderFiles() {
            const container = document.getElementById('filesContainer');

            if (allFiles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎵</div>
                        <div>No audio files found</div>
                    </div>
                `;
                return;
            }

            let html = '';
            allFiles.forEach((file, index) => {
                html += `
                    <div class="audio-file" style="animation-delay: ${index * 0.05}s">
                        <div class="audio-icon">🎵</div>
                        <div class="audio-info">
                            <div class="audio-name">${escapeHtml(file.name)}</div>
                            <div class="audio-meta">
                                <span>📁 ${file.size_formatted}</span>
                                <span>📅 ${file.last_modified_formatted}</span>
                            </div>
                        </div>
                        <div class="audio-actions">
                            <button class="btn btn-icon btn-play" onclick="playAudio('${escapeHtml(file.key)}', '${escapeHtml(file.name)}')" title="Play">
                                ▶️
                            </button>
                            <button class="btn btn-icon btn-download" onclick="downloadAudio('${escapeHtml(file.key)}')" title="Download">
                                ⬇️
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function getPresignedUrl(key) {
            const response = await fetch(`/api/s3/audio-url?key=${encodeURIComponent(key)}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                const detail = await fastApiErrorDetail(response, 'Failed to get audio URL');
                throw new Error(detail);
            }

            const data = await response.json();
            return data.url;
        }

        async function playAudio(key, name) {
            try {
                showToast('Loading audio...');
                const url = await getPresignedUrl(key);

                const playerContainer = document.getElementById('audioPlayer');
                const audioElement = document.getElementById('audioElement');
                const playerTitle = document.getElementById('playerTitle');

                audioElement.src = url;
                playerTitle.textContent = name;
                playerContainer.classList.add('active');

                audioElement.play();
            } catch (error) {
                console.error('Error playing audio:', error);
                showToast('Error playing audio: ' + error.message, true);
            }
        }

        async function downloadAudio(key) {
            try {
                showToast('Preparing download...');

                // Get presigned URL with download=true to force Content-Disposition: attachment
                const response = await fetch(`/api/s3/audio-url?key=${encodeURIComponent(key)}&download=true`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    const detail = await fastApiErrorDetail(response, 'Failed to get download URL');
                    throw new Error(detail);
                }

                const data = await response.json();
                const url = data.url;

                // Open the download URL - browser will download due to Content-Disposition header
                window.location.href = url;

                showToast('Download started!');
            } catch (error) {
                console.error('Error downloading audio:', error);
                showToast('Error downloading audio: ' + error.message, true);
            }
        }

        function closePlayer() {
            const playerContainer = document.getElementById('audioPlayer');
            const audioElement = document.getElementById('audioElement');

            audioElement.pause();
            audioElement.src = '';
            playerContainer.classList.remove('active');
        }

        function updatePagination() {
            document.getElementById('pageNumber').textContent = currentPage;
            document.getElementById('totalPagesInfo').textContent = totalPages;

            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                applyLocalPagination();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                applyLocalPagination();
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentPage = 1;
            if (fileCatalog.length) applyLocalPagination();
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', debounce(() => {
            currentPage = 1;
            if (fileCatalog.length) applyLocalPagination();
        }, 500));

        document.getElementById('pageSizeSelect').addEventListener('change', () => {
            currentPage = 1;
            if (fileCatalog.length) applyLocalPagination();
        });

        // Initial load
        fetchFiles();
    </script>
</body>

</html>
