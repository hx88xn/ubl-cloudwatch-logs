<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Files - S3</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/hearth.css">
    <style>
        .files-container {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        .files-header {
            background: var(--bg-elevated);
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .files-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 16px; font-weight: 600;
        }
        .files-scroll {
            max-height: 600px; overflow-y: auto; padding: 14px;
        }
        .files-scroll::-webkit-scrollbar { width: 6px; }
        .files-scroll::-webkit-scrollbar-track { background: transparent; }
        .files-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.25); border-radius: 3px; }
        .audio-file {
            background: rgba(26, 21, 18, 0.5);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.2s ease;
        }
        .audio-file:hover {
            background: var(--accent-glow);
            border-color: var(--border-hover);
        }
        .audio-icon {
            font-size: 28px;
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.15);
        }
        .audio-info { flex: 1; min-width: 0; }
        .audio-name {
            font-size: 14px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 3px; word-break: break-all;
        }
        .audio-meta {
            display: flex; gap: 14px;
            font-size: 11px; color: var(--text-muted);
        }
        .audio-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-icon {
            width: 38px; height: 38px; padding: 0;
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; cursor: pointer; border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .btn-play {
            background: var(--success-bg);
            border-color: var(--success-border);
            color: var(--success);
        }
        .btn-play:hover { background: rgba(52, 211, 153, 0.15); }
        .btn-download {
            background: var(--info-bg);
            border-color: var(--info-border);
            color: var(--info);
        }
        .btn-download:hover { background: rgba(103, 232, 249, 0.12); }
        .audio-player-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(35, 31, 27, 0.97);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 14px 28px;
            display: none; align-items: center; gap: 18px;
            z-index: 1000;
        }
        .audio-player-container.active { display: flex; }
        .player-info { flex: 0 0 200px; min-width: 0; }
        .player-title {
            font-size: 13px; font-weight: 700; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .player-subtitle { font-size: 11px; color: var(--text-muted); }
        .player-controls { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .player-audio { width: 100%; height: 32px; }
        .player-close {
            background: var(--error-bg); border: 1px solid var(--error-border);
            color: var(--error); width: 34px; height: 34px;
            border-radius: var(--radius-sm); cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .player-close:hover { background: rgba(251, 113, 133, 0.15); }
        @media (max-width: 768px) {
            .audio-file { flex-direction: column; align-items: flex-start; }
            .audio-actions { width: 100%; justify-content: flex-end; }
            .audio-player-container { flex-direction: column; padding: 14px; }
            .player-info { flex: none; width: 100%; }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">&#9835;</div>
            <span class="logo-text">Audio Files</span>
        </div>
        <div class="nav-buttons">
            <button class="back-btn" onclick="window.location.href='/dashboard'">&#8592; Back to Dashboard</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">

        <div class="header">
            <h1><span class="accent-text">S3 Audio Files</span></h1>
            <div class="metadata">
                <div class="metadata-item">
                    <span>Bucket:</span>
                    <span class="metadata-value">{{ bucket }}</span>
                </div>
                <div class="metadata-item">
                    <span>Region:</span>
                    <span class="metadata-value">{{ region }}</span>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">Total Audio Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPage">1</div>
                <div class="stat-label">Current Page</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPages">1</div>
                <div class="stat-label">Total Pages</div>
            </div>
        </div>

        <div class="filters">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Search Files</label>
                    <input type="text" id="searchInput" placeholder="Search by filename...">
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="fetchFiles()">
                    &#8635; Refresh Files
                </button>
                <button class="btn btn-secondary" onclick="clearSearch()">
                    &#10005; Clear Search
                </button>
            </div>
        </div>

        <div class="files-container">
            <div class="files-header">
                <h2>Audio Files</h2>
                <span id="fileCount">Loading...</span>
            </div>
            <div class="files-scroll" id="filesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading audio files...</div>
                </div>
            </div>
            <div class="pagination">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousPage()" disabled>
                    &#9664; Previous
                </button>
                <span class="page-info">Page <span id="pageNumber">1</span> of <span id="totalPagesInfo">1</span></span>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" disabled>
                    Next &#9654;
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Player -->
    <div class="audio-player-container" id="audioPlayer">
        <div class="player-info">
            <div class="player-title" id="playerTitle">No file selected</div>
            <div class="player-subtitle">Now Playing</div>
        </div>
        <div class="player-controls">
            <audio class="player-audio" id="audioElement" controls></audio>
        </div>
        <button class="player-close" onclick="closePlayer()">&#10005;</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>

        let currentPage = 1;
        let totalPages = 1;
        let allFiles = [];
        let fileCatalog = [];
        let isLoading = false;
        let searchDebounceTimer = null;
        const token = localStorage.getItem('access_token');
        let pageSize = 50;


        if (!token) {
            window.location.href = '/login';
        }

        // Debounce function for search
        function debounce(func, delay) {
            return function (...args) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function showLoading() {
            isLoading = true;
            document.getElementById('filesContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div id="loadingStatus">Loading audio files...</div>
                </div>
            `;
        }

        function setLoadingStatus(text) {
            const el = document.getElementById('loadingStatus');
            if (el) el.textContent = text;
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        async function fastApiErrorDetail(response, fallback) {
            if (response.status === 504) {
                const ct = response.headers.get('content-type') || '';
                if (ct.includes('application/json')) {
                    try {
                        const body = await response.json();
                        if (typeof body.detail === 'string') return body.detail;
                    } catch (_) { /* ignore */ }
                }
                return 'Gateway timeout (504). Listing the whole S3 bucket usually exceeds the proxy limit. Set S3_AUDIO_PREFIX on the server, ensure S3_AUDIO_LISTING_TIMEOUT_SECONDS finishes before the load balancer times out, or increase the ALB/nginx upstream timeout.';
            }
            const ct = response.headers.get('content-type') || '';
            if (!ct.includes('application/json')) {
                return fallback || `HTTP ${response.status}`;
            }
            try {
                const body = await response.json();
                if (typeof body.detail === 'string') return body.detail;
                if (Array.isArray(body.detail)) {
                    return body.detail.map((d) => (d.msg != null ? d.msg : JSON.stringify(d))).join('; ');
                }
                if (body.detail != null) return String(body.detail);
            } catch (_) { /* ignore */ }
            return fallback || `HTTP ${response.status}`;
        }

        function getFilteredFiles() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!q) return fileCatalog;
            return fileCatalog.filter((f) => f.name.toLowerCase().includes(q));
        }

        function applyLocalPagination() {
            const filtered = getFilteredFiles();
            const total = filtered.length;
            totalPages = total === 0 ? 1 : Math.ceil(total / pageSize);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            const start = (currentPage - 1) * pageSize;
            allFiles = filtered.slice(start, start + pageSize);

            document.getElementById('totalFiles').textContent = total.toLocaleString();
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            if (total === 0) {
                document.getElementById('fileCount').textContent =
                    fileCatalog.length === 0 ? 'No files loaded' : 'No files match';
            } else {
                const end = start + allFiles.length;
                document.getElementById('fileCount').textContent =
                    `Showing ${(start + 1).toLocaleString()}\u2013${end.toLocaleString()} of ${total.toLocaleString()} files`;
            }
            renderFiles();
            updatePagination();
        }

        async function fetchFiles() {
            if (isLoading) return;

            showLoading();
            pageSize = 50;

            try {
                const merged = [];
                let s3Token = null;
                let chunk = 0;
                const maxChunks = 100000;
                let listingComplete = false;

                while (chunk < maxChunks) {
                    chunk += 1;
                    let url = '/api/s3/audio-files';
                    if (s3Token) {
                        url += '?s3_continuation_token=' + encodeURIComponent(s3Token);
                    }

                    const response = await fetch(url, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.status === 401) {
                        localStorage.removeItem('access_token');
                        window.location.href = '/login';
                        return;
                    }

                    if (!response.ok) {
                        const detail = await fastApiErrorDetail(response, 'Failed to fetch files');
                        throw new Error(detail);
                    }

                    const data = await response.json();
                    merged.push(...data.files);
                    listingComplete = !!data.listing_complete;
                    setLoadingStatus(
                        listingComplete
                            ? `Loaded ${merged.length.toLocaleString()} audio files`
                            : `Scanning\u2026 ${merged.length.toLocaleString()} audio files so far`
                    );

                    if (listingComplete) break;
                    s3Token = data.next_s3_continuation_token;
                    if (!s3Token) break;
                }

                if (!listingComplete) {
                    showToast('Scan stopped before the bucket was fully listed (limit reached).', true);
                }

                merged.sort((a, b) => (a.last_modified < b.last_modified ? 1 : a.last_modified > b.last_modified ? -1 : 0));
                fileCatalog = merged;
                currentPage = 1;
                applyLocalPagination();

            } catch (error) {
                console.error('Error fetching files:', error);
                showToast('Error fetching files: ' + error.message, true);
                document.getElementById('filesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#10060;</div>
                        <div>Error loading audio files</div>
                        <div style="margin-top: 8px; font-size: 12px;">${escapeHtml(error.message)}</div>
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        function renderFiles() {
            const container = document.getElementById('filesContainer');

            if (allFiles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#9835;</div>
                        <div>No audio files found</div>
                    </div>
                `;
                return;
            }

            let html = '';
            allFiles.forEach((file, index) => {
                html += `
                    <div class="audio-file" style="animation-delay: ${index * 0.05}s">
                        <div class="audio-icon">&#9835;</div>
                        <div class="audio-info">
                            <div class="audio-name">${escapeHtml(file.name)}</div>
                            <div class="audio-meta">
                                <span>${file.size_formatted}</span>
                                <span>${file.last_modified_formatted}</span>
                            </div>
                        </div>
                        <div class="audio-actions">
                            <button class="btn btn-icon btn-play" onclick="playAudio('${escapeHtml(file.key)}', '${escapeHtml(file.name)}')" title="Play">
                                &#9654;
                            </button>
                            <button class="btn btn-icon btn-download" onclick="downloadAudio('${escapeHtml(file.key)}')" title="Download">
                                &#8615;
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function getPresignedUrl(key) {
            const response = await fetch(`/api/s3/audio-url?key=${encodeURIComponent(key)}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                const detail = await fastApiErrorDetail(response, 'Failed to get audio URL');
                throw new Error(detail);
            }

            const data = await response.json();
            return data.url;
        }

        async function playAudio(key, name) {
            try {
                showToast('Loading audio...');
                const url = await getPresignedUrl(key);

                const playerContainer = document.getElementById('audioPlayer');
                const audioElement = document.getElementById('audioElement');
                const playerTitle = document.getElementById('playerTitle');

                audioElement.src = url;
                playerTitle.textContent = name;
                playerContainer.classList.add('active');

                audioElement.play();
            } catch (error) {
                console.error('Error playing audio:', error);
                showToast('Error playing audio: ' + error.message, true);
            }
        }

        async function downloadAudio(key) {
            try {
                showToast('Preparing download...');

                // Get presigned URL with download=true to force Content-Disposition: attachment
                const response = await fetch(`/api/s3/audio-url?key=${encodeURIComponent(key)}&download=true`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    const detail = await fastApiErrorDetail(response, 'Failed to get download URL');
                    throw new Error(detail);
                }

                const data = await response.json();
                const url = data.url;

                // Open the download URL - browser will download due to Content-Disposition header
                window.location.href = url;

                showToast('Download started!');
            } catch (error) {
                console.error('Error downloading audio:', error);
                showToast('Error downloading audio: ' + error.message, true);
            }
        }

        function closePlayer() {
            const playerContainer = document.getElementById('audioPlayer');
            const audioElement = document.getElementById('audioElement');

            audioElement.pause();
            audioElement.src = '';
            playerContainer.classList.remove('active');
        }

        function updatePagination() {
            document.getElementById('pageNumber').textContent = currentPage;
            document.getElementById('totalPagesInfo').textContent = totalPages;

            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                applyLocalPagination();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                applyLocalPagination();
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentPage = 1;
            if (fileCatalog.length) applyLocalPagination();
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', debounce(() => {
            currentPage = 1;
            if (fileCatalog.length) applyLocalPagination();
        }, 500));

        // Initial load
        fetchFiles();
    </script>
</body>

</html>
