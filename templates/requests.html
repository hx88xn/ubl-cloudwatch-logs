<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requests Analytics</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/hearth.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .period-section {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 22px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .period-label {
            font-size: 12px; font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .period-tabs { display: flex; gap: 8px; }
        .period-tab {
            padding: 9px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px; font-weight: 600;
            font-family: 'Nunito Sans', sans-serif;
            transition: all var(--transition);
        }
        .period-tab:hover { background: var(--accent-glow); border-color: var(--border-hover); }
        .period-tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-color: transparent; color: var(--bg-deep);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25); font-weight: 700;
        }
        .count-select {
            padding: 9px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            font-size: 13px; cursor: pointer; outline: none;
        }
        .count-select option { background: var(--bg-base); color: var(--text-primary); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card.total { border-left: 3px solid #67e8f9; }
        .stat-card.peak { border-left: 3px solid #34d399; }
        .stat-card.avg { border-left: 3px solid #fbbf24; }
        .stat-card.total .stat-value { color: #67e8f9; }
        .stat-card.peak .stat-value { color: #34d399; }
        .stat-card.avg .stat-value { color: #fbbf24; }
        .chart-container {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 26px;
            margin-bottom: 24px;
        }
        .chart-header {
            display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px;
        }
        .chart-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; }
        .chart-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .cache-badge {
            font-size: 11px; padding: 3px 10px; border-radius: 16px;
            background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success);
        }
        .cache-badge.partial { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.25); color: #fbbf24; }
        .cache-badge.fresh { background: rgba(129, 140, 248, 0.1); border-color: rgba(129, 140, 248, 0.25); color: #818cf8; }
        .chart-wrapper { position: relative; height: 420px; width: 100%; }
        .loading-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(26, 21, 18, 0.85); border-radius: var(--radius-md);
            align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 10;
        }
        .loading-overlay.show { display: flex; }
        .loading-text { font-size: 13px; color: var(--text-muted); }
        @media (max-width: 768px) {
            .chart-wrapper { height: 300px; }
            .period-section { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">&#128202;</div>
            <span class="logo-text">Requests</span>
        </div>
        <div class="nav-buttons">
            <a href="/traffic" class="nav-btn">Traffic</a>
            <a href="/dashboard" class="nav-btn">Dashboard</a>
            <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Requests</h1>
            <p id="retentionNotice" style="display:none; margin-top:8px; color:#fbbf24; font-size:13px;"></p>
        </div>

        <div class="period-section">
            <span class="period-label">Group by:</span>
            <div class="period-tabs">
                <button class="period-tab active" data-period="monthly">Monthly</button>
                <button class="period-tab" data-period="weekly">Weekly</button>
            </div>
            <span class="period-label" style="margin-left:8px;">Show:</span>
            <select class="count-select" id="countSelect" onchange="reload()">
                <option value="6">6 periods</option>
                <option value="12">12 periods</option>
                <option value="24">24 periods</option>
            </select>
        </div>

        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-value" id="statTotal">&mdash;</div>
                <div class="stat-label">Total Requests</div>
            </div>
            <div class="stat-card peak">
                <div class="stat-value" id="statPeak">&mdash;</div>
                <div class="stat-label">Peak Period</div>
            </div>
            <div class="stat-card avg">
                <div class="stat-value" id="statAvg">&mdash;</div>
                <div class="stat-label">Avg per Period</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <div>
                    <div class="chart-title">Requests per Period</div>
                    <div class="chart-subtitle" id="chartSubtitle">Loading&hellip;</div>
                </div>
                <div id="cacheBadge" class="cache-badge" style="display:none;"></div>
            </div>
            <div style="position:relative;">
                <div class="chart-wrapper">
                    <canvas id="requestsChart"></canvas>
                </div>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <div class="loading-text" id="loadingText">Fetching data from CloudWatch&hellip;</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/login';

        let chart = null;
        let currentPeriod = 'monthly';
        let abortCtrl = null;

        async function checkAccess() {
            const res = await fetch('/api/user/me', { headers: { Authorization: `Bearer ${token}` } });
            if (res.status === 401) { localStorage.removeItem('access_token'); window.location.href = '/login'; return false; }
            if (res.ok) {
                const user = await res.json();
                if (user.role !== 'admin-ubl') {
                    showToast('Access denied. Admin access required.', 'error');
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                    return false;
                }
            }
            return true;
        }

        function showLoading(msg = 'Fetching from CloudWatch\u2026') {
            document.getElementById('loadingText').textContent = msg;
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('statTotal').textContent = '\u2026';
            document.getElementById('statPeak').textContent = '\u2026';
            document.getElementById('statAvg').textContent = '\u2026';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        async function fetchData() {
            if (abortCtrl) abortCtrl.abort();
            abortCtrl = new AbortController();

            const count = document.getElementById('countSelect').value;
            showLoading(`Fetching ${currentPeriod} data\u2026`);

            try {
                const res = await fetch(`/api/requests?period=${currentPeriod}&count=${count}`, {
                    headers: { Authorization: `Bearer ${token}` },
                    signal: abortCtrl.signal
                });

                if (res.status === 401) { localStorage.removeItem('access_token'); window.location.href = '/login'; return; }
                if (res.status === 403) { showToast('Access denied.', 'error'); setTimeout(() => window.location.href = '/dashboard', 1500); return; }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                console.table(data.details);
                if (data.retention_days) {
                    console.log(`CloudWatch retention: ${data.retention_days} days`);
                }
                renderChart(data);
                updateStats(data);
                updateCacheBadge(data.cached_flags);
                updateSubtitle(data);
                updateRetentionNotice(data);
                showToast('Data loaded');

            } catch (err) {
                if (err.name === 'AbortError') return;
                console.error(err);
                showToast('Error fetching data', 'error');
            } finally {
                hideLoading();
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('requestsChart').getContext('2d');

            if (chart) chart.destroy();

            const peakIdx = data.counts.length
                ? data.counts.indexOf(Math.max(...data.counts))
                : -1;

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Requests',
                        data: data.counts,
                        backgroundColor: data.counts.map((_, i) =>
                            i === peakIdx
                                ? 'rgba(103, 232, 249, 0.7)'
                                : 'rgba(245, 158, 11, 0.6)'
                        ),
                        borderColor: data.counts.map((_, i) =>
                            i === peakIdx
                                ? '#67e8f9'
                                : '#f59e0b'
                        ),
                        borderWidth: 2,
                        borderRadius: 6,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.85)',
                            titleColor: '#fff',
                            bodyColor: '#e4e4e4',
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: ctx => ` ${ctx.parsed.y.toLocaleString()} requests`,
                                afterLabel: ctx => data.cached_flags[ctx.dataIndex] ? ' (cached)' : ' (live)'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 12 } }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: 'rgba(255,255,255,0.6)',
                                font: { size: 12 },
                                callback: v => v.toLocaleString()
                            },
                            title: {
                                display: true,
                                text: 'Number of Requests',
                                color: 'rgba(255,255,255,0.5)',
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });
        }

        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.total.toLocaleString();
            document.getElementById('statPeak').textContent = data.peak.toLocaleString();
            document.getElementById('statAvg').textContent = data.average.toLocaleString();
        }

        function updateCacheBadge(cachedFlags) {
            const badge = document.getElementById('cacheBadge');
            const allCached = cachedFlags.every(Boolean);
            const noneCached = cachedFlags.every(f => !f);
            badge.style.display = 'block';
            if (allCached) {
                badge.className = 'cache-badge';
                badge.textContent = 'All cached';
            } else if (noneCached) {
                badge.className = 'cache-badge fresh';
                badge.textContent = 'Live data';
            } else {
                const cachedCount = cachedFlags.filter(Boolean).length;
                badge.className = 'cache-badge partial';
                badge.textContent = `${cachedCount}/${cachedFlags.length} cached`;
            }
        }

        function updateSubtitle(data) {
            const periodLabel = { monthly: 'month', weekly: 'week' }[data.period] || data.period;
            document.getElementById('chartSubtitle').textContent =
                `${data.labels.length} ${periodLabel}s \u00b7 ${data.total.toLocaleString()} total requests`;
        }

        function updateRetentionNotice(data) {
            const el = document.getElementById('retentionNotice');
            if (data.retention_days) {
                el.style.display = 'block';
                el.textContent = `\u26a0\ufe0f CloudWatch log retention is ${data.retention_days} days \u2014 only periods within this window will have data.`;
            } else {
                el.style.display = 'none';
            }
        }

        function reload() { fetchData(); }

        document.querySelectorAll('.period-tab').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = this.dataset.period;

                const countSelect = document.getElementById('countSelect');
                const defaults = { monthly: '6', weekly: '12' };
                countSelect.value = defaults[currentPeriod] || '6';

                fetchData();
            });
        });

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = type === 'error' ? 'rgba(239,68,68,0.9)' : 'rgba(16,185,129,0.9)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        async function init() {
            const ok = await checkAccess();
            if (ok) fetchData();
        }

        init();
    </script>
</body>

</html>
