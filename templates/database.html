<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database - {{ db_name }}</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/hearth.css">
    <style>
        .container { max-width: 1600px; }
        .tables-list {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 0;
        }
        .table-chip {
            padding: 9px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex; align-items: center; gap: 8px;
            font-size: 13px;
        }
        .table-chip:hover {
            background: var(--accent-glow);
            border-color: var(--border-hover);
        }
        .table-chip.active {
            background: rgba(245, 158, 11, 0.15);
            border-color: var(--accent);
            color: var(--accent-light);
        }
        .table-chip-name { font-weight: 600; }
        .table-chip-count {
            font-size: 11px; color: var(--text-muted);
            background: rgba(255,255,255,0.05); padding: 2px 7px;
            border-radius: 8px;
        }
        .data-container {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        .data-header {
            background: var(--bg-elevated);
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .data-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 16px; font-weight: 600;
        }
        .table-wrapper {
            overflow-x: auto; max-height: 500px; overflow-y: auto;
        }
        .table-wrapper::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-wrapper::-webkit-scrollbar-track { background: transparent; }
        .table-wrapper::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.25); border-radius: 3px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            background: var(--bg-deep);
            padding: 10px 14px; text-align: left;
            font-weight: 700; color: var(--accent);
            position: sticky; top: 0; cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid var(--border-strong);
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .data-table th:hover { background: var(--bg-base); }
        .data-table th .sort-icon { margin-left: 4px; opacity: 0.4; }
        .data-table th.sorted .sort-icon { opacity: 1; }
        .data-table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            max-width: 300px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .data-table tr:hover td { background: var(--accent-glow); }
        .data-table td.cell-null { color: var(--text-muted); font-style: italic; }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="logo-icon">&#128451;</div>
            <span class="logo-text">Database Viewer</span>
        </div>
        <div class="nav-buttons">
            <button class="btn btn-secondary" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">

        <div class="header">
            <h1>Database Viewer</h1>
            <div class="header-meta">
                <span>Database: <strong>{{ db_name }}</strong></span>
                <span>Region: <strong>{{ region }}</strong></span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalTables">0</div>
                <div class="stat-label">Tables</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRows">0</div>
                <div class="stat-label">Rows in Selected Table</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPage">1</div>
                <div class="stat-label">Current Page</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPages">1</div>
                <div class="stat-label">Total Pages</div>
            </div>
        </div>

        <!-- Tables List -->
        <div class="filters">
            <h3 style="margin-bottom: 16px; font-size: 16px; font-weight: 600;">Select a Table</h3>
            <div class="tables-list" id="tablesList">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading tables...</div>
                </div>
            </div>
        </div>

        <!-- Data Filters -->
        <div class="filters" id="dataFilters" style="display: none;">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Search</label>
                    <input type="text" id="searchInput" class="filter-input" placeholder="Search in all columns...">
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="fetchTableData()">Refresh</button>
                <button class="btn btn-secondary" onclick="clearSearch()">Clear Search</button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="data-container" id="dataContainer" style="display: none;">
            <div class="data-header">
                <h2 id="tableTitle">Table Data</h2>
                <span id="rowCount" style="color: var(--text-muted); font-size: 13px;">Loading...</span>
            </div>
            <div class="table-wrapper">
                <table class="data-table" id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousPage()" disabled>Previous</button>
                <span class="page-info">Page <span id="pageNumber">1</span> of <span id="totalPagesInfo">1</span></span>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()" disabled>Next</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let selectedTable = null;
        let columns = [];
        let orderBy = null;
        let orderDir = 'DESC';
        let searchDebounceTimer = null;
        const token = localStorage.getItem('access_token');
        let pageSize = 50;

        if (!token) {
            window.location.href = '/login';
        }

        function debounce(func, delay) {
            return function (...args) {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        async function fetchTables() {
            try {
                const response = await fetch('/api/db/tables', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    const errorMessage = errorData.detail || `HTTP ${response.status}`;
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                renderTables(data.tables);
                document.getElementById('totalTables').textContent = data.tables.length;

            } catch (error) {
                console.error('Error fetching tables:', error);
                showToast('Error: ' + error.message, true);
                document.getElementById('tablesList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#10060;</div>
                        <div>Error loading tables</div>
                        <div style="margin-top: 8px; font-size: 12px; max-width: 500px; word-break: break-word;">${escapeHtml(error.message)}</div>
                    </div>
                `;
            }
        }

        function renderTables(tables) {
            const container = document.getElementById('tablesList');

            if (tables.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#128237;</div>
                        <div>No tables found</div>
                    </div>
                `;
                return;
            }

            let html = '';
            tables.forEach(table => {
                html += `
                    <div class="table-chip" onclick="selectTable('${table.name}')" id="chip-${table.name}">
                        <span class="table-chip-name">${table.name}</span>
                        <span class="table-chip-count">${table.row_count.toLocaleString()} rows</span>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function selectTable(tableName) {
            document.querySelectorAll('.table-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            document.getElementById(`chip-${tableName}`).classList.add('active');

            selectedTable = tableName;
            currentPage = 1;
            orderBy = null;
            orderDir = 'DESC';

            document.getElementById('dataFilters').style.display = 'block';
            document.getElementById('dataContainer').style.display = 'block';
            document.getElementById('tableTitle').textContent = tableName;

            fetchTableData();
        }

        async function fetchTableData() {
            if (!selectedTable) return;

            const search = document.getElementById('searchInput').value.trim();
            pageSize = 50;

            document.getElementById('tableBody').innerHTML = `
                <tr><td colspan="100" class="loading">
                    <div class="spinner"></div>
                    <div>Loading data...</div>
                </td></tr>
            `;

            try {
                let url = `/api/db/table/${selectedTable}?page=${currentPage}&page_size=${pageSize}`;
                if (search) {
                    url += `&search=${encodeURIComponent(search)}`;
                }
                if (orderBy) {
                    url += `&order_by=${orderBy}&order_dir=${orderDir}`;
                }

                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to fetch data');
                }

                const data = await response.json();
                columns = data.columns;
                totalPages = data.total_pages;

                renderTableData(data);
                updateStats(data);
                updatePagination();

            } catch (error) {
                console.error('Error fetching data:', error);
                showToast('Error fetching data: ' + error.message, true);
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="100">
                        <div class="empty-state">
                            <div class="empty-state-icon">&#10060;</div>
                            <div>Error loading data</div>
                        </div>
                    </td></tr>
                `;
            }
        }

        function renderTableData(data) {
            let headerHtml = '<tr>';
            data.columns.forEach(col => {
                const isSorted = orderBy === col;
                const sortIcon = isSorted ? (orderDir === 'ASC' ? '&#9650;' : '&#9660;') : '&#8693;';
                headerHtml += `
                    <th class="${isSorted ? 'sorted' : ''}" onclick="sortBy('${col}')">
                        ${col} <span class="sort-icon">${sortIcon}</span>
                    </th>
                `;
            });
            headerHtml += '</tr>';
            document.getElementById('tableHead').innerHTML = headerHtml;

            if (data.rows.length === 0) {
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="${data.columns.length}">
                        <div class="empty-state">
                            <div class="empty-state-icon">&#128237;</div>
                            <div>No data found</div>
                        </div>
                    </td></tr>
                `;
                return;
            }

            let bodyHtml = '';
            data.rows.forEach(row => {
                bodyHtml += '<tr>';
                data.columns.forEach(col => {
                    const value = row[col];
                    if (value === null || value === undefined) {
                        bodyHtml += `<td class="cell-null">NULL</td>`;
                    } else {
                        bodyHtml += `<td title="${escapeHtml(String(value))}">${escapeHtml(String(value))}</td>`;
                    }
                });
                bodyHtml += '</tr>';
            });

            document.getElementById('tableBody').innerHTML = bodyHtml;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sortBy(column) {
            if (orderBy === column) {
                orderDir = orderDir === 'ASC' ? 'DESC' : 'ASC';
            } else {
                orderBy = column;
                orderDir = 'DESC';
            }
            currentPage = 1;
            fetchTableData();
        }

        function updateStats(data) {
            document.getElementById('totalRows').textContent = data.total.toLocaleString();
            document.getElementById('currentPage').textContent = data.page;
            document.getElementById('totalPages').textContent = data.total_pages;
            document.getElementById('rowCount').textContent = `Showing ${data.rows.length} of ${data.total.toLocaleString()} rows`;
        }

        function updatePagination() {
            document.getElementById('pageNumber').textContent = currentPage;
            document.getElementById('totalPagesInfo').textContent = totalPages;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                fetchTableData();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                fetchTableData();
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentPage = 1;
            fetchTableData();
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', debounce(() => {
            currentPage = 1;
            fetchTableData();
        }, 500));

        // Initial load
        fetchTables();
    </script>
</body>

</html>
